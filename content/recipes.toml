# Workstation recipes. Crafting is free at any workstation; gathering the
# ingredients is the real cost. Useless recipes are deliberate texture.

[silver-bullet]
name = "Cast a Silver Bullet"
inputs = ["silver", "flintlock-shot"]
output = "silver-bullet"
requires_origin_reagent = true
description = "Melt true silver over the forge and cast it about a lead core, then quench it in what this evil's beginning demands."

[cold-iron-pin]
name = "Draw a Cold Iron Pin"
inputs = ["cold-iron"]
output = "cold-iron-pin"
requires_origin_reagent = true
description = "Beat bog iron out cold — never let it see the fire — and temper it against what this evil's beginning demands."

[wound-draught]
name = "Brew a Wound Draught"
inputs = ["moon-herb", "bitter-root"]
output = "wound-draught"
description = "Steep moon-herb with bitter-root into a physic against torn flesh."

[binding-charm]
name = "Sew a Binding Charm"
inputs = ["grave-dust", "moon-herb"]
output = "binding-charm"
requires_origin_reagent = true
description = "Sew grave-dust and moon-herb into a caul, steeped in what this evil's beginning demands, to strip the risen dead of their shadow."

[iron-charm]
name = "Hammer an Iron Charm"
inputs = ["coin", "coin"]
output = "iron-charm"
description = "Beat two pennies into a warding knot. Old wives praise it; monsters do not notice it."
