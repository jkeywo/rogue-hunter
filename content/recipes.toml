# Workstation recipes. Crafting is free at any workstation; gathering the
# ingredients is the real cost. Useless recipes are deliberate texture.

[silver-bullet]
name = "recipes.silver-bullet.name"
inputs = ["silver", "flintlock-shot"]
output = "silver-bullet"
requires_origin_reagent = true
description = "recipes.silver-bullet.description"

[cold-iron-pin]
name = "recipes.cold-iron-pin.name"
inputs = ["cold-iron"]
output = "cold-iron-pin"
requires_origin_reagent = true
description = "recipes.cold-iron-pin.description"

[wound-draught]
name = "recipes.wound-draught.name"
inputs = ["moon-herb", "bitter-root"]
output = "wound-draught"
description = "recipes.wound-draught.description"

[binding-charm]
name = "recipes.binding-charm.name"
inputs = ["grave-dust", "moon-herb"]
output = "binding-charm"
requires_origin_reagent = true
description = "recipes.binding-charm.description"

[iron-charm]
name = "recipes.iron-charm.name"
inputs = ["coin", "coin"]
output = "iron-charm"
description = "recipes.iron-charm.description"
