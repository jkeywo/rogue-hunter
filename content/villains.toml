# Villain archetypes. Threat tiers stack: each raises health by
# tier_bonus_health and unlocks the next tier behaviour in order.

[werewolf]
name = "villains.werewolf.name"
glyph = "W"
health = 18
melee_damage = 3
hit_percent = 60
tier_bonus_health = 3
concealment = "npc-host"
weakness_item = "silver-bullet"
affected_by_consecration = false
description = "villains.werewolf.description"

[werewolf.pounce]
range = 6
cooldown = 3
telegraph = "villains.werewolf.pounce.telegraph"

[werewolf.regeneration]
per_turn = 1
telegraph = "villains.werewolf.regeneration.telegraph"

[[werewolf.tier_behaviours]]
id = "swift-hunter"
name = "villains.werewolf.tier-behaviours.swift-hunter.name"
effect = { kind = "pounce-cooldown", turns = 2 }
telegraph = "villains.werewolf.tier-behaviours.swift-hunter.telegraph"

[[werewolf.tier_behaviours]]
id = "savage"
name = "villains.werewolf.tier-behaviours.savage.name"
effect = { kind = "bonus-melee-damage", amount = 1 }
telegraph = "villains.werewolf.tier-behaviours.savage.telegraph"

[revenant]
name = "villains.revenant.name"
glyph = "R"
health = 20
melee_damage = 3
hit_percent = 70
tier_bonus_health = 3
concealment = "dormant-grave"
weakness_item = "binding-charm"
affected_by_consecration = true
description = "villains.revenant.description"

[revenant.cadence]
period = 5
dash_tiles = 4
bound_vulnerable_turns = 5
consecrated_damage_per_turn = 1
vulnerable_telegraph = "villains.revenant.cadence.vulnerable-telegraph"
dash_telegraph = "villains.revenant.cadence.dash-telegraph"
guarded_telegraph = "villains.revenant.cadence.guarded-telegraph"

[[revenant.tier_behaviours]]
id = "spectral-speed"
name = "villains.revenant.tier-behaviours.spectral-speed.name"
effect = { kind = "dash-cooldown", turns = 4 }
telegraph = "villains.revenant.tier-behaviours.spectral-speed.telegraph"

[[revenant.tier_behaviours]]
id = "grave-chill"
name = "villains.revenant.tier-behaviours.grave-chill.name"
effect = { kind = "bonus-melee-damage", amount = 1 }
telegraph = "villains.revenant.tier-behaviours.grave-chill.telegraph"

[witch]
name = "villains.witch.name"
glyph = "H"
health = 16
melee_damage = 3
hit_percent = 65
tier_bonus_health = 3
concealment = "npc-host"
weakness_item = "cold-iron-pin"
affected_by_consecration = false
description = "villains.witch.description"

[witch.ward]
charges = 3
leak_damage = 1
reweave_turns = 4
absorb_telegraph = "villains.witch.ward.absorb-telegraph"
break_telegraph = "villains.witch.ward.break-telegraph"
reweave_telegraph = "villains.witch.ward.reweave-telegraph"

[[witch.tier_behaviours]]
id = "deepening-hex"
name = "villains.witch.tier-behaviours.deepening-hex.name"
effect = { kind = "ward-charges", amount = 2 }
telegraph = "villains.witch.tier-behaviours.deepening-hex.telegraph"

[[witch.tier_behaviours]]
id = "bitter-word"
name = "villains.witch.tier-behaviours.bitter-word.name"
effect = { kind = "bonus-melee-damage", amount = 1 }
telegraph = "villains.witch.tier-behaviours.bitter-word.telegraph"
