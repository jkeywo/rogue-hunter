# Gathering and looting opportunities anchored to map slots. Lore/Mystic
# gathering supplies crafting ingredients; free finds supply coin and shot.
#
# The three origin reagents each have their own source. A hunter who has not
# read the origin can still gather all three, but pays pool and travel for
# the ignorance.

[draw-hallowed-water]
name = "gathers.draw-hallowed-water.name"
map = "settlement"
slot = "church-altar"
pool = "lore"
cost = 1
items = ["hallowed-water"]
discovery = { kind = "sight" }
prompt = "gathers.draw-hallowed-water.prompt"
reveal = "gathers.draw-hallowed-water.reveal"

[take-wronged-earth]
name = "gathers.take-wronged-earth.name"
map = "settlement"
slot = "graveyard-gate"
pool = "social"
cost = 1
items = ["wronged-earth"]
discovery = { kind = "sight" }
prompt = "gathers.take-wronged-earth.prompt"
reveal = "gathers.take-wronged-earth.reveal"

[recover-covenant-seal]
name = "gathers.recover-covenant-seal.name"
map = "outlying"
slot = "manor-study"
pool = "lore"
cost = 1
items = ["covenant-seal"]
discovery = { kind = "sight" }
prompt = "gathers.recover-covenant-seal.prompt"
reveal = "gathers.recover-covenant-seal.reveal"

# Each reagent has a second source on another map. Two independent certified
