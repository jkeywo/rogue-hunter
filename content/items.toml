# Items. Combat values are authored tuning, not code constants.

[hunting-blade]
name = "Hunting Blade"
glyph = "/"
kind = { kind = "melee-weapon", damage = 2 }
description = "A long working knife, kept wickedly sharp."

[flintlock]
name = "Flintlock"
glyph = "}"
kind = { kind = "ranged-weapon", damage = 3, range = 8, ammo = "flintlock-shot" }
description = "A horse-pistol that throws a heavy ball. Slow to trust, loud as judgement."

[flintlock-shot]
name = "Flintlock Shot"
glyph = "*"
kind = { kind = "ammunition" }
description = "A cast lead ball and a measure of powder."

[silver-bullet]
name = "Silver Bullet"
glyph = "*"
kind = { kind = "weakness-ammunition", damage = 10, stops_regeneration = true }
description = "A ball of true silver. Against the beast it bites to the curse's heart, and what it wounds does not heal."

[wound-draught]
name = "Wound Draught"
glyph = "!"
kind = { kind = "draught", heal = 4 }
description = "A bitter physic of moon-herb. Drinking it costs you the moment, but knits torn flesh."

[binding-charm]
name = "Binding Charm"
glyph = "&"
kind = { kind = "binding-charm" }
description = "Grave-dust and moon-herb sewn in a caul. Pressed close to the risen dead, it strips their shroud of shadow for five long breaths."

[cold-iron-pin]
name = "Cold Iron Pin"
glyph = "|"
kind = { kind = "weakness-blade", damage = 7 }
description = "A long pin of unworked cold iron, never near a forge fire. A hex slides off honest steel; it cannot get a grip on this at all."

[silver]
name = "Raw Silver"
glyph = "$"
kind = { kind = "ingredient" }
description = "A fist of pale metal, cold to the touch."

[cold-iron]
name = "Cold Iron"
glyph = "$"
kind = { kind = "ingredient" }
description = "Bog iron, never smelted, never blessed. The old women say the older things cannot abide it, and for once the old women are right."

[hallowed-water]
name = "Hallowed Water"
glyph = "\""
kind = { kind = "ingredient" }
description = "Water from the parish font, blessed at a season nobody now remembers. It answers what was cursed a long time ago."

[wronged-earth]
name = "Wronged Earth"
glyph = "\""
kind = { kind = "ingredient" }
description = "A handful of soil from the plot of the one who was wronged. It carries the debt, and a debt can be made to answer."

