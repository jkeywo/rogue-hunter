# Schemes control the timed events, the minion family, and the one act that
# blunts the escalation. The minor event fires on the minor_event_turn, the
# major on the major_event_turn; each raises the villain's threat tier unless
# the scheme has been pre-empted first.

[reign-of-fear]
name = "schemes.reign-of-fear.name"
minion_enemy = "wolf"
description = "schemes.reign-of-fear.description"

[reign-of-fear.minor_event]
name = "schemes.reign-of-fear.minor-event.name"
text = "schemes.reign-of-fear.minor-event.text"
site_map = "settlement"
spawn_minions = 1

[reign-of-fear.major_event]
name = "schemes.reign-of-fear.major-event.name"
text = "schemes.reign-of-fear.major-event.text"
site_map = "settlement"
spawn_minions = 2

[reign-of-fear.preempt]
name = "schemes.reign-of-fear.preempt.name"
site = "npc"
map_role = "settlement"
pool = "social"
cost = 1
prompt = "schemes.reign-of-fear.preempt.prompt"
reveal = "schemes.reign-of-fear.preempt.reveal"
blunted_text = "schemes.reign-of-fear.preempt.blunted-text"

