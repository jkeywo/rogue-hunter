# Outlying site tactical map, 32x20. A drowned abbey rather than a shut-up
# manor: the nave has fallen in and the cloister floods, so the buildings are
# broken into islands joined by causeways. The manor's rooms are one enclosure
# you work through; the abbey's are separate places you must commit to
# reaching, with water between them and a barred undercroft at the far end.

name = "maps.outlying-abbey.name"
role = "outlying-site"
description = "maps.outlying-abbey.description"

rows = [
  "################:###############",
  "#,,,,,,,,,,,,,,,:,,,,,,,,,TT,,,#",
  "#,TT,,,,,,,,,,,,:,,,,,,,,,,,,,,#",
  "#,,,,,,##########+#########,,,,#",
  "#,,,,,,#........#.........#,,,,#",
  "#,,,,,,#........+.........#,,,,#",
  "#,,,,,,#........#.........#,,,,#",
  "#,,,,,,##+#######~~~~~~~~~#,,,,#",
  "#,,,,,,#...#~~~~~~~~~~~~~~#,,,,#",
  "#,,,,,,#...#~~~~~~~~~~~~~~#,,,,#",
  "#,,,,,,#...#~~~~~~~~~~~~~~#,,,,#",
  "#,,,,,,#...#~~~~~~,~~~~~~~#,,,,#",
  "#,,,,,,#####,,,,,,,,,,#####,,,,#",
  ":,,,,,,,,,,,,,,,,,,,,,,,,,,,,,,#",
  "#,TT,,,,,,,,,,,,,,,,,,,,n,n,n,,#",
  "#,,,,,,,,,,,,,,,,,,,#########,,#",
  "#,,,,,,,,,,,,,,,,,,,=n.n.n.n#,,#",
  "#,,,,,,,,,,,,,,,,,,,#.......#,,#",
  "#,,,,,,,,,,,,,,,,,,,#n.n.n.n#,,#",
  "################################",
]

[legend]
"#" = "wall"
"." = "floor"
"," = "grass"
":" = "road"
"~" = "water"
"n" = "grave"
"+" = "door"
"=" = "barred-door"
"T" = "tree"

# The chapter house stands dry on the west side; the flooded cloister lies
# between it and everything else.
[[slots]]
id = "manor-hall"
kind = "outlying-site"
at = [12, 5]
label = "maps.outlying-abbey.slots.manor-hall.label"

[[slots]]
id = "manor-study"
kind = "outlying-site"
at = [9, 9]
label = "maps.outlying-abbey.slots.manor-study.label"

# The undercroft, behind its barred door: the cellar equivalent, and still
# the one room that costs a Physical point to open.
[[slots]]
id = "manor-cellar"
kind = "outlying-site"
at = [22, 5]
label = "maps.outlying-abbey.slots.manor-cellar.label"

