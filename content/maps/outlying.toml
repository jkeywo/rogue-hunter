# Outlying site tactical map, 32x20: the forsaken manor. Manor house with a
# barred cellar, an old crypt full of graves, and a squatters' campsite.
# Trail north to the wilderness, road west to the settlement.

name = "The Forsaken Manor"
role = "outlying-site"
description = "A manor abandoned to damp and worse. The family crypt still stands in the grounds, and someone barred its door from the outside."

