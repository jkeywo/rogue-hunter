at = [27, 14]

[[slots]]
id = "graveyard-gate"
kind = "npc"
at = [24, 13]

# The body was found at the water's edge, where the race runs fastest.
[[slots]]
id = "kill-site"
kind = "kill-site"
at = [9, 9]

[[slots]]
id = "market-stall"
kind = "npc"
at = [5, 8]

[[slots]]
id = "square"
kind = "npc"
at = [6, 11]

[[slots]]
id = "inn-hearth"
