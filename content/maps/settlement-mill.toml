[[exits]]
to = "wilderness"
at = [0, 7]

[[exits]]
to = "outlying"
at = [26, 19]

# Cover on both banks, so neither side of the race is a killing floor.
[[cover_pockets]]
tiles = [[3, 12], [4, 12], [3, 13], [4, 13]]

[[cover_pockets]]
tiles = [[29, 12], [30, 12], [29, 13], [30, 13]]
