# Settlement tactical map, 32x20. Church and graveyard north-west, forge
# north-east, market square centre, houses and inn south. Roads lead west to
# the wilderness and south to the outlying manor.

name = "maps.settlement.name"
role = "settlement"
description = "maps.settlement.description"

