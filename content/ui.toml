# Splash-screen text and key bindings shown before a run begins.

splash_title = "ROGUE HUNTER"

splash_intro = [
  "Something is killing the valley folk, and the valley has sent for you.",
  "You have six days. Walk the settlement, the deep wood, and the forsaken manor; trade words and watch faces; read the signs the thing cannot help but leave. Prove its name twice over, prepare its death, and take the hunt to it — or let the sixth night come, and it will take the hunt to you.",
  "Everything you learn, you keep. Even dying only costs you a day. Days are the one thing you cannot craft.",
]

[[key_bindings]]
keys = "Arrows / hjkl+yubn"
action = "Move / melee an adjacent enemy"

[[key_bindings]]
keys = "e / Enter"
action = "Interact: investigate, talk, travel, craft, loot"

[[key_bindings]]
keys = "f / F"
action = "Fire the flintlock / fire a silver bullet"

[[key_bindings]]
keys = "a / p / s"
action = "Aim / Power Attack / Sprint (stamina)"

[[key_bindings]]
keys = "x / K"
action = "Set Snare / Killing Blow (Physical)"

[[key_bindings]]
keys = "q / c"
action = "Drink a wound draught / press a binding charm"

[[key_bindings]]
keys = "g / r / v / L"
action = "Grimoire / Faces / the Valley / the Record"

[[key_bindings]]
keys = "Space / ."
action = "Wait a turn"

[[key_bindings]]
keys = "Mouse"
action = "Hover to inspect; click to move, target, or act"

[[key_bindings]]
keys = "Esc"
action = "Cancel / back"
