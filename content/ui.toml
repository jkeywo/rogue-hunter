# Splash-screen text and key bindings shown before a run begins.
#
# The prose itself lives in content/strings.csv; the ids below are lookups
# into it. Paragraph and binding *order* is structure, and stays here.

splash_title = "ui.splash.title"

splash_intro = [
  "ui.splash.intro.1",
  "ui.splash.intro.2",
  "ui.splash.intro.3",
]

[[key_bindings]]
