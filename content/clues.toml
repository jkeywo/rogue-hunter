# Evidence templates. Each clue speaks to exactly one axis of the case:
# identity (which villain), origin-sign (how it began), scheme-sign (what it
# is working toward). Location, weakness, and ingredient-source clues make no
# claim and are scoped with the villains/origins/schemes filters instead.
#
#   supports   = the values the sign is consistent with, and the cases it may
#                be placed in. Empty means "fits any value on the axis".
#   rules_out  = the values this clue positively eliminates. A non-empty list
#                makes the clue DISCRIMINATING; every case must seed at least
#                two reachable discriminators per axis, and a certified route
#                needs at least one discriminating identity clue.
#
# Placeholders: {npc} the implicated villager, {grave} the villain's grave.

# ===========================================================================
# IDENTITY - soft signs (consistent with several villains, prove nothing)
# ===========================================================================

[second-face]
name = "A Second Face"
category = "identity"
supports = ["werewolf", "witch"]
action = "gossip"
pool = "social"
site = "npc"
obscurity = 0
prompt = "The villagers are eager to talk about the nights, if you let them circle to it."
reveal = "The same shape to every account: somebody here keeps a second face for after dark. Which of the old horrors that means, nobody will say."

[the-dead-are-in-it]
name = "The Dead Are In It"
category = "identity"
supports = ["revenant", "witch"]
action = "examine"
pool = "lore"
site = "grave"
obscurity = 1
prompt = "The churchyard has been walked over more than the sexton's work accounts for."
reveal = "Grave-earth trodden and re-trodden, and a plot disturbed at the edges. Something in this valley has business with the dead — whether it is one of them, or only using them, the ground does not say."

[wrongness-in-the-air]
name = "A Wrongness in the Air"
category = "identity"
supports = ["werewolf", "revenant", "witch"]
action = "commune"
pool = "mystic"
site = "wilds"
obscurity = 1
prompt = "The old stones sit in a silence that presses on the ears."
reveal = "The vision is only weight and appetite and something walking. Whatever is loose here is old and it is hungry, and that is all the stones will commit to."

# ===========================================================================
# IDENTITY - discriminators
# ===========================================================================

[tracks-to-town]
name = "Tracks to Town"
category = "identity"
supports = ["werewolf"]
rules_out = ["revenant", "witch"]
action = "track"
pool = "lore"
site = "wilds"
obscurity = 1
prompt = "Pad-marks the size of plates cross the trail here, heading for the settlement."
reveal = "You follow the pad-marks until, at the field's edge, they become boot-prints — walking calmly toward {npc}'s door. Nothing dead and nothing merely hexed leaves that trail."

[wounds-that-closed]
name = "The Wounds That Closed"
category = "identity"
supports = ["werewolf"]
rules_out = ["revenant", "witch"]
action = "persuade"
pool = "social"
site = "npc"
obscurity = 1
prompt = "Someone got a blow in on the thing, and lived. They will not enjoy remembering it."
reveal = "'I opened it to the bone,' he says, 'and watched the bone close over.' Flesh that knits itself is the beast's trick, and only the beast's."

[the-earth-breathes]
name = "The Earth Breathes"
category = "identity"
supports = ["revenant"]
rules_out = ["werewolf", "witch"]
action = "persuade"
pool = "social"
site = "npc"
obscurity = 1
prompt = "The gravedigger drinks like a man trying to forget his own trade."
reveal = "He grips your wrist: 'I saw the earth breathe over {grave}. Rise and fall, like a sleeper.' Nothing living lies in a grave and breathes it."

[grave-shadow]
name = "The Shroud of Grave-Shadow"
category = "identity"
supports = ["revenant"]
rules_out = ["werewolf", "witch"]
action = "examine"
pool = "lore"
site = "kill-site"
obscurity = 1
prompt = "The killing blows here fell strangely — some bit deep, most seem not to have landed at all."
reveal = "Blows that pass through without wounding, then one that tears. That is grave-shadow thinning and closing: the risen dead's rhythm, not a beast's and not a hex."

[hex-marks]
name = "Hex-marks on the Lintel"
category = "identity"
supports = ["witch"]
rules_out = ["werewolf", "revenant"]
action = "examine"
pool = "lore"
site = "npc"
obscurity = 1
prompt = "The door-frames in this row all carry the same small scoring, cut fresh over older cuts."
reveal = "Deliberate hex-work, cut by a steady hand that knew the figure — and cut outward, from {npc}'s house toward the rest. Beasts do not draw, and the dead do not need to."

[steel-turned-aside]
name = "Honest Steel Turned Aside"
category = "identity"
supports = ["witch"]
rules_out = ["werewolf", "revenant"]
action = "gossip"
pool = "social"
site = "npc"
obscurity = 2
prompt = "One of the drovers swung on something in the dark and wants to tell you he is not a coward."
reveal = "'The blade went wide,' he insists, 'and I had it dead straight.' Steel that slides off a working, over and over — that is a ward worn on the body, not a hide and not a shroud."

[no-hex-work]
name = "No Hand Behind It"
category = "identity"
supports = ["werewolf", "revenant"]
rules_out = ["witch"]
action = "examine"
pool = "lore"
site = "church"
obscurity = 1
prompt = "If a working were being kept up in this parish, it would leave the same marks in the same places every time."
reveal = "You check the lintels, the font, the threshold stones: no figures, no scoring, no working kept up anywhere. Whatever this is, no living hand is drawing it."

[undisturbed-ground]
name = "The Undisturbed Ground"
category = "identity"
supports = ["werewolf", "witch"]
rules_out = ["revenant"]
action = "examine"
pool = "lore"
site = "grave"
obscurity = 1
prompt = "The sexton's rows can be read like a ledger, if you know that settled earth lies flat."
reveal = "Every plot settled, every sod flat, not one pushed up from beneath. Nothing has risen out of this ground — whatever walks here walked in on its own two feet."

# ===========================================================================
# ORIGIN - soft signs
# ===========================================================================

[something-old]
name = "Something Old Behind It"
category = "origin-sign"
supports = ["ancient-curse", "broken-covenant"]
action = "examine"
pool = "lore"
site = "church"
obscurity = 0
prompt = "The parish keeps its papers badly, but it keeps them."
reveal = "The trouble has a long tail: the same field-names, the same families, the same complaint recurring across generations. Something here was set in motion a long time ago — set, or promised."

[a-wrong-between-people]
name = "A Wrong Between People"
category = "origin-sign"
supports = ["bitter-betrayal", "broken-covenant"]
action = "gossip"
pool = "social"
site = "npc"
obscurity = 0
prompt = "The settlement talks around something the way a tongue works at a broken tooth."
reveal = "It started with people, not omens: an arrangement, and someone on the wrong end of it. Whether that was a grudge taken up or a bargain put down, the gossip cannot agree."

# ===========================================================================
# ORIGIN - discriminators
# ===========================================================================

[the-long-register]
name = "The Long Register"
category = "origin-sign"
supports = ["ancient-curse"]
rules_out = ["bitter-betrayal", "broken-covenant"]
action = "examine"
pool = "lore"
site = "church"
obscurity = 1
prompt = "The registers go back three hundred years, and someone has been careless with the old pages."
reveal = "The same affliction, entered in the same words, in three centuries of different hands. This did not begin with anyone now living, and nobody promised it — it was simply laid on, and never lifted."

[stones-before-the-parish]
name = "Stones Before the Parish"
category = "origin-sign"
supports = ["ancient-curse"]
rules_out = ["bitter-betrayal", "broken-covenant"]
action = "commune"
pool = "mystic"
site = "wilds"
obscurity = 2
prompt = "The standing stones were old when the church was new, and they are still warm to the hand."
reveal = "What answers is older than any compact and older than any grudge: a thing laid down before there were parties to agree or betray. It has simply been waiting to be fed again."

[living-memory]
name = "Inside Living Memory"
category = "origin-sign"
supports = ["bitter-betrayal", "broken-covenant"]
rules_out = ["ancient-curse"]
action = "persuade"
pool = "social"
site = "npc"
obscurity = 0
prompt = "Whatever started this, someone here was alive when it did."
reveal = "They can date it. A season, a name, an argument in the road — this began inside living memory, and inherited curses do not have a date."

[the-sworn-vengeance]
name = "The Sworn Vengeance"
category = "origin-sign"
supports = ["bitter-betrayal"]
rules_out = ["ancient-curse", "broken-covenant"]
action = "persuade"
pool = "social"
site = "npc"
obscurity = 1
prompt = "There is old bad blood here, and someone knows who swore what, and before whom."
reveal = "It spills out at last: a wrong done, and a vow sworn before witnesses to make the valley pay for it. No bargain, no obligation — only a debt of spite, taken up freely."

[the-stopped-payment]
name = "The Stopped Payment"
category = "origin-sign"
supports = ["broken-covenant"]
rules_out = ["ancient-curse", "bitter-betrayal"]
action = "examine"
pool = "lore"
site = "outlying-site"
obscurity = 1
prompt = "The manor kept its accounts to the penny, and then, one year, stopped keeping one of them."
reveal = "A payment rendered every year without fail for four generations — then a line ruled through it, and nothing after. Not a grudge and not a curse: a compact honoured for centuries, and broken by someone who thought it was only money."

[the-unpaid-obligation]
name = "The Unpaid Obligation"
category = "origin-sign"
supports = ["broken-covenant"]
rules_out = ["ancient-curse", "bitter-betrayal"]
action = "commune"
pool = "mystic"
site = "grave"
obscurity = 2
prompt = "Something here is owed, and knows the exact figure."
reveal = "What answers is not spite and not an old malediction. It recites terms: what was promised, what was given, and the year the giving stopped. It is not angry. It is collecting."

