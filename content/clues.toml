rules_out = ["hidden-design", "the-calling"]
action = "gossip"
pool = "social"
site = "npc"
obscurity = 1
prompt = "Ask them when they hear it, rather than what they hear."
reveal = "Always at the hour the taproom empties, always near enough the houses to carry. It is timed for the largest number of listeners. Something that wanted quiet work would not perform."

[materials-not-people]
name = "Materials, Not People"
category = "scheme-sign"
supports = ["hidden-design"]
rules_out = ["reign-of-fear", "the-calling"]
action = "examine"
pool = "lore"
site = "church"
obscurity = 1
