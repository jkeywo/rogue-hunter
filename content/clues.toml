# Evidence templates. Each clue speaks to exactly one axis of the case:
# identity (which villain), origin-sign (how it began), scheme-sign (what it
# is working toward). Location, weakness, and ingredient-source clues make no
# claim and are scoped with the villains/origins/schemes filters instead.
#
#   supports   = the values the sign is consistent with, and the cases it may
#                be placed in. Empty means "fits any value on the axis".
#   rules_out  = the values this clue positively eliminates. A non-empty list
#                makes the clue DISCRIMINATING; every case must seed at least
#                two reachable discriminators per axis, and a certified route
#                needs at least one discriminating identity clue.
#
# Placeholders: {npc} the implicated villager, {grave} the villain's grave.

# ===========================================================================
