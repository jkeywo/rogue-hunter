# Clue templates. The generator instantiates these into placed opportunities.
# Placeholders: {npc} the implicated NPC, {grave} the villain's grave,
# {villain} the villain's name. Obscurity: 0 obvious .. 3 niche; certified
# fallback routes must stay within the fallback obscurity budget.

# --- Werewolf identity ------------------------------------------------------

[torn-cloth]
name = "Torn Cloth"
archetype = "werewolf"
category = "identity"
action = "examine"
pool = "lore"
site = "kill-site"
obscurity = 0
prompt = "The kill is savage, but something pale is snagged where the body was dragged."
reveal = "A scrap of good cloth, torn by teeth — and you have seen {npc} wearing its match."

[tracks-to-town]
name = "Tracks to Town"
archetype = "werewolf"
category = "identity"
action = "track"
pool = "lore"
site = "wilds"
obscurity = 1
prompt = "Pad-marks the size of plates cross the trail here, heading for the settlement."
reveal = "You follow the pad-marks until, at the field's edge, they become boot-prints — walking calmly toward {npc}'s door."

