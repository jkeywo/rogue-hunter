reveal = "Candle-wax, lead from the flashing, chalk, a censer, grave-earth by the sackful. Things, not people, and every one of them a component. Something is being built here."

[preparation-not-appetite]
name = "Preparation, Not Appetite"
category = "scheme-sign"
supports = ["hidden-design"]
rules_out = ["reign-of-fear", "the-calling"]
action = "track"
pool = "lore"
site = "outlying-site"
obscurity = 1
prompt = "The traffic to this place is regular, and regular traffic has a purpose."
reveal = "The same trips, the same loads, the same hours — carrying in, never carrying out. This is not hunger and it is not display. It is a schedule of works."

[walked-out-unhurried]
name = "They Walked Out Unhurried"
category = "scheme-sign"
supports = ["the-calling"]
rules_out = ["reign-of-fear", "hidden-design"]
action = "examine"
pool = "lore"
site = "npc"
obscurity = 0
prompt = "The empty cottage was left open to the weather, and the bed not slept in."
reveal = "No struggle, no blood, no forced door. One set of prints, unhurried, even-strided, leading away and not coming back. Nobody took them. They were called, and they went."

[route-stones]
name = "The Marked Route-Stones"
category = "scheme-sign"
supports = ["the-calling"]
rules_out = ["reign-of-fear", "hidden-design"]
action = "track"
pool = "lore"
site = "wilds"
obscurity = 1
prompt = "There are stones set along this trail at intervals too even to be chance."
reveal = "Each stone scored with the same mark, each set exactly within sight of the next — a road laid out to be followed by someone who is not deciding to follow it. This is a route, and it leads somewhere that is counting arrivals."

[nothing-for-show]
name = "Nothing Done for Show"
category = "scheme-sign"
supports = ["hidden-design", "the-calling"]
rules_out = ["reign-of-fear"]
action = "gossip"
pool = "social"
site = "npc"
obscurity = 1
prompt = "For all the fear in this valley, ask what anyone has actually witnessed."
reveal = "Nobody has seen a thing. No display, no bodies left where the road runs, no message. Whatever this is, it is working quietly and would rather not be watched at all."

