# ---------------------------------------------------------------------------
# Conditions: what the valley is like as she comes into it.
#
# A run draws one from every axis — four in all — and the draw is shaped: one
# of them bites, one of them helps, and the other two are texture. Which axis
# supplies which is drawn per run, so an unwelcoming valley in one game is an
# open-handed one in the next.
#
# Each axis therefore holds three neutral entries, exactly one bane, and
# exactly one boon. A bane must never touch the final fight — route
# certification promises the hunt is winnable and a condition is not allowed to
# quietly take that back. A boon may do as it likes: it can only ever make a
# certified route easier to walk.
# ---------------------------------------------------------------------------

[[conditions]]
id = "a-soft-winter"
axis = "season"
body = ["openings.conditions.a-soft-winter.body.1"]

[[conditions]]
id = "the-thaw"
axis = "season"
body = ["openings.conditions.the-thaw.body.1"]

