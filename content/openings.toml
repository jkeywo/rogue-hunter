# How a run opens.
#
# Every run begins with one of these. Most draw from the generic hooks, which
# frame the hunt and claim nothing about the case. The rest explain the one
# thing the hunter is already holding when play begins: certification may let
# both routes lean on a single node, but only when that node was resolved
# before the run started, because a thing already known cannot be lost to
# fallout the way an informant can.
#
# Openings are keyed on the kind of node only — where it sits (a place or a
# person) and what it gave — never on the villain or the scheme. An opening
# must never be able to telegraph the answer.
#
# Placeholders: {npc} in person-anchored entries, {clue} in place-anchored
# ones, {place} anywhere.

# -- Generic hooks. No claim about the case. --------------------------------

[[openings]]
id = "sent-for"
body = [
  "openings.openings.sent-for.body.1",
]

[[openings]]
id = "the-road-in"
body = [
  "openings.openings.the-road-in.body.1",
]

[[openings]]
