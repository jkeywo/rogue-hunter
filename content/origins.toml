# Origins change the villain's signs and, decisively, the reagent that every
# counter must be quenched with. Read the origin wrong and the counter you
# carry will not bite — so origin evidence is load-bearing, not flavour.

[ancient-curse]
name = "origins.ancient-curse.name"
sign_sites = ["grave", "church", "wilds"]
counter_reagent = "hallowed-water"
counter_flavour = "origins.ancient-curse.counter-flavour"
description = "origins.ancient-curse.description"

[bitter-betrayal]
name = "origins.bitter-betrayal.name"
sign_sites = ["npc", "kill-site", "outlying-site"]
counter_reagent = "wronged-earth"
counter_flavour = "origins.bitter-betrayal.counter-flavour"
description = "origins.bitter-betrayal.description"

[broken-covenant]
name = "origins.broken-covenant.name"
sign_sites = ["outlying-site", "church", "grave"]
counter_reagent = "covenant-seal"
counter_flavour = "origins.broken-covenant.counter-flavour"
description = "origins.broken-covenant.description"
