# The Occultist: reads what the valley would rather not have read. Stronger
# Lore and a usable Mystic pool buy foresight and ground that fights on her
# side; she pays for it in health, in force, and in having no clean finish.

name = "hunters.occultist.name"
title = "hunters.occultist.title"
glyph = "@"
health = 9
lore_cap = 3
social_cap = 2
mystic_cap = 2
physical_cap = 1
stamina_cap = 6
starting_items = ["hunting-blade", "flintlock", "flintlock-shot", "flintlock-shot"]

# She carries the same body and the same flintlock as anyone, so the generic
# manoeuvres carry over — except Power Attack. Putting her weight behind a
# blow is not a thing she does.

[[manoeuvres]]
id = "aim"
name = "hunters.occultist.manoeuvres.aim.name"
stamina_cost = 3
effect = { kind = "sure-ranged-shot" }
description = "hunters.occultist.manoeuvres.aim.description"

[[manoeuvres]]
id = "sprint"
name = "hunters.occultist.manoeuvres.sprint.name"
stamina_cost = 2
effect = { kind = "dash", tiles = 2 }
description = "hunters.occultist.manoeuvres.sprint.description"

# Her signatures are the two things she can do that nobody else can: make an
# ambiguous sign speak plainly, and make a patch of ground refuse the thing
# that is coming across it.

[[signatures]]
id = "read-the-sign"
name = "hunters.occultist.signatures.read-the-sign.name"
physical_cost = 1
effect = { kind = "read-the-sign" }
description = "hunters.occultist.signatures.read-the-sign.description"

[[signatures]]
id = "ward-the-ground"
name = "hunters.occultist.signatures.ward-the-ground.name"
physical_cost = 1
effect = { kind = "ward-the-ground", turns = 6, radius = 1 }
description = "hunters.occultist.signatures.ward-the-ground.description"
