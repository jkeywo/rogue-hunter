# The Advocate: works the valley through its people. The highest Social in the
# game opens doors the others cannot, and she can press a soured witness back
# into talking — but she has no finish and little health of her own, and when
# it comes to the fight she wins it by not standing in it alone.

name = "hunters.advocate.name"
title = "hunters.advocate.title"
glyph = "@"
health = 10
lore_cap = 2
social_cap = 3
mystic_cap = 1
physical_cap = 1
stamina_cap = 6
starting_items = ["hunting-blade", "flintlock", "flintlock-shot", "flintlock-shot"]

# The same body and flintlock as anyone, so the generic manoeuvres carry over —
# except Power Attack. Throwing her weight behind a blow is not her craft.

[[manoeuvres]]
id = "aim"
name = "hunters.advocate.manoeuvres.aim.name"
stamina_cost = 3
effect = { kind = "sure-ranged-shot" }
description = "hunters.advocate.manoeuvres.aim.description"

[[manoeuvres]]
id = "sprint"
name = "hunters.advocate.manoeuvres.sprint.name"
stamina_cost = 2
effect = { kind = "dash", tiles = 2 }
description = "hunters.advocate.manoeuvres.sprint.description"

# Her signatures are the two things only she can do: keep a door from closing
# for good, and call in a villager who owes her to stand at her shoulder when
# the thing finally shows itself. The second is what the estimate vouches for;
# the first is who she is.

[[signatures]]
id = "press-the-witness"
name = "hunters.advocate.signatures.press-the-witness.name"
physical_cost = 1
effect = { kind = "press-the-witness" }
description = "hunters.advocate.signatures.press-the-witness.description"

[[signatures]]
id = "stand-with-me"
name = "hunters.advocate.signatures.stand-with-me.name"
physical_cost = 1
effect = { kind = "second-in-the-fight", turns = 6, damage_per_turn = 3 }
description = "hunters.advocate.signatures.stand-with-me.description"
