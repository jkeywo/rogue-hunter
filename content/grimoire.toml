# The hunter's grimoire: fully unlocked from the start, written in fiction
# rather than numbers. Exact timings are made observable in play through
# telegraph messages in the event log.

[[entries]]
id = "werewolf"
title = "Of the Werewolf"
body = """By day it wears a neighbour's face and does a neighbour's work; you will not know it by looking. By night it is appetite in a grey hide. Its wounds close as fast as you can deal them — save one kind. Watch for the gather-and-leap: given a clear run it will cross half a field in a heartbeat, so keep a tree, a cart, a wall between you and it. Break its lane and you break its favourite trick. Two honest proofs of its day-name are enough to hunt it; one is gossip, and gossip hangs innocents."""

[[entries]]
id = "revenant"
title = "Of the Revenant"
body = """A corpse that rose with unfinished business and no intention of leaving it so. It sleeps in its own grave between errands. No blade nor ball bites it while its shroud of grave-shadow holds; the shroud thins for a moment at its own slow rhythm — you will see it, and it knows you can. It flows across ground unnaturally fast when it wishes, and it wishes it mostly when retreating from your steel or closing on your throat. Consecrated ground holds the shroud open and scalds it; a binding charm pressed close does the same for a handful of breaths. Learn the rhythm, or bring the counter."""

[[entries]]
id = "wolf"
title = "Of Wolves"
body = """Honest beasts, if hungry ones. They come straight on and die like anything else. When wolves grow bold near a settlement, ask what emboldened them."""

[[entries]]
id = "bandit"
title = "Of Bandits"
body = """Desperate men with pistols and poor judgement. They keep their distance and shoot while they can; close with them, or answer in kind. Ask who pays them, for someone always does."""

[[entries]]
id = "restless-dead"
title = "Of the Restless Dead"
body = """Corpses walked by another's will. Slow — mercifully slow — but tireless, and strong enough to matter if you let them lay hands on you. Where the restless dead shuffle, a greater dead commands."""

[[entries]]
id = "ancient-curse"
title = "Of Ancient Curses"
body = """Some evils are inherited like debts. Where the trouble is old, its signs are old: parish records, weathered stones, dreams that repeat in different sleepers. Ask the church and the graves before you ask the living."""

[[entries]]
id = "bitter-betrayal"
title = "Of Bitter Betrayals"
body = """Some evils are minted fresh from a wrong done between the living. Where the trouble is new, its signs walk about the settlement: grudges nursed, names not spoken, blood not yet dry. Ask the living, and watch their eyes."""

[[entries]]
id = "reign-of-fear"
title = "Of a Reign of Fear"
body = """Some monsters kill to be feared, and grow strong on the fearing. Each outrage it lands unanswered, it swells bolder and harder to put down. Do not give it the week it wants."""

[[entries]]
id = "hidden-design"
title = "Of Hidden Designs"
body = """Some monsters kill only as a mason chips stone: in service of a work. Watch for hired men guarding nothing worth stealing, and desecrations that look like errands. Each stage the design completes, its author grows greater."""

[[entries]]
id = "silver-bullet"
title = "Of Silver"
body = """True silver is the old wound the curse remembers. A ball of it, cast honest over a forge, bites the beast to the quick — and what silver tears, no moon can mend. Churches keep more silver than they know; so do abandoned mines."""

[[entries]]
id = "binding-charm"
title = "Of Binding Charms"
body = """Grave-dust freely given, moon-herb picked by night, sewn tight in a caul. Pressed close to the risen dead it strips their shroud of shadow for five long breaths — long enough, for a hunter who has kept her steel ready."""

[[entries]]
id = "consecration"
title = "Of Consecrated Ground"
body = """A church may be made proof against the risen dead: a rite of one evening, if the altar is willing. On warded ground a revenant's shroud cannot close and the very floor scalds it. Against a living curse like the beast, the rite is so much candle-smoke. Choose the ground of your last stand as carefully as your weapon."""

[[entries]]
id = "threat-tiers"
title = "Of Letting Evil Wait"
body = """Every night you spend certain-but-unready, the enemy spends feeding. An evil that lands its outrages grows in hide and cunning both. The prepared early hunt is the master's stroke; the patient hunt is the journeyman's; the hunt on the final night is the one you did not choose."""

[[entries]]
id = "preparations"
title = "Of Preparations"
body = """A snare set in a doorway has killed more monsters than any sword. A draught of moon-herb has saved more hunters than any prayer. Take the hour at the forge; the grave you dodge may be your own."""
