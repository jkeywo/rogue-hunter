# Design and technical decisions made during MVP implementation.
# Each entity records a decision, its rationale, and what it binds.

entities:
  - decision: bevy-ratatui-native-client
    core:
      status: accepted
      confidence: confirmed
      title: Native client keeps Bevy plus Ratatui
      summary: The native terminal client uses Bevy (minimal features, no renderer) with the bevy_ratatui plugin, per the original spec and an explicit product decision; the engine foundation stays in place for the deferred graphical-tiles future even though the MVP view is pure ASCII.
      references: [terminal-client]

  - decision: single-pcg32-stream
    core:
      status: accepted
      confidence: confirmed
      title: Hand-rolled PCG32 as the single simulation PRNG
      summary: One PCG-XSH-RR 64/32 stream, seeded through SplitMix64, drives generation and then continues into runtime events. The generator is implemented in-crate with the reference constants and a pinned-sequence test so no dependency upgrade can silently change replays.
      references: [command-replay, seeded-mystery-generator]

  - decision: integer-only-simulation-math
    core:
      status: accepted
      confidence: confirmed
      title: Integer-only rules math
      summary: All rules arithmetic uses integers - whole percent for hit chances, permille for viability, millis fixed-point inside the combat heuristic - so native x86-64 and wasm32 builds cannot diverge through floating-point behaviour.
      references: [command-replay, combat-viability-threshold]

  - decision: toml-content-embedded
    core:
      status: accepted
      confidence: confirmed
      title: TOML content embedded at compile time
      summary: The authored catalogue is hand-editable TOML under content/, chosen for first-class Rust serde support. Files are embedded with include_str! so terminal, browser, and CI builds ship byte-identical content, which the replay contract depends on. Schema validation is serde deny_unknown_fields plus a cross-reference pass that runs in every build and as a CI gate.
      references: [authored-content-catalogue]

  - decision: share-code-format
    core:
      status: accepted
      confidence: confirmed
      title: RH1 share-code format
      summary: "A replay is postcard-serialized {version, seed, semantic command log}, given a CRC32 trailer against hand-copy typos, base64url-encoded without padding, and prefixed RH1-. Codes embed a format version and mismatches are rejected outright: any rules change legitimately invalidates old logs."
      references: [command-replay, replay-save-persistence]

  - decision: postcard-fnv-state-digest
    core:
      status: accepted
      confidence: confirmed
      title: Postcard plus FNV-1a state digests
      summary: Run states are digested by postcard-serializing them (target-independent varint encoding) and hashing with FNV-1a 64. The same seed and command log must produce the same digest on native and WASM builds; CI replay checks compare these.
      references: [command-replay]

  - decision: workspace-crate-architecture
    core:
      status: accepted
      confidence: confirmed
      title: Eight-crate headless-first workspace
      summary: "rh-content (catalogue), rh-core (authoritative sim), rh-gen (generator and planner), rh-replay (run harness, share codes, autoplayer), rh-client-core (shared session and viewmodel), rh-cli (developer toolchain), rh-terminal (Bevy and Ratatui), rh-web (wasm Canvas/HTML). Clients depend only on rh-client-core so both stay thin views over identical state and commands."
      references: [headless-simulation-foundation, semantic-command-boundary]

  - decision: eight-way-grid-bresenham
    core:
      status: accepted
      confidence: confirmed
      title: Eight-way movement and symmetric Bresenham sight
      summary: Movement and adjacency are 8-way Chebyshev. Lines of sight and pounce lanes share one symmetric Bresenham walk, so what the hunter can see and what a monster can leap along always agree.
      references: [encounter-turn-rules, werewolf-pounce-ai, map-visibility]

  - decision: opportunity-graph-model
    core:
      status: accepted
      confidence: confirmed
      title: Typed opportunity nodes with knowledge and access gates
      summary: The clue graph materialises as typed opportunities (identity, location, lead, item grants, mystic favour, social texture) with two gate kinds - knowledge (revealed-by another node) and physical access (a structural force node such as a barred door). Structural nodes stay open to both certified routes since forced terrain stays forced in play.
      references: [seeded-mystery-generator, clue-graph-validator, physical-and-stamina-resources]

  - decision: route-certification-strategy
    core:
      status: accepted
      confidence: confirmed
      title: Fallback-first pairing with minimised routes
      summary: The planner certifies the obvious fallback first, penalises its used nodes, then finds the early route in what remains, retrying alternative fallbacks and the reverse assignment before rejecting a candidate. Found routes are minimised by re-search so neither consumes nodes it does not need. Penalties are node-level per the generator contract; routes may consult the same NPC about different things.
      references: [clue-graph-validator, certified-route-deadlines]

  - decision: viability-model-calibration
    core:
      status: provisional
      confidence: confirmed
      title: Empirically calibrated viability heuristic
      summary: The combat heuristic races expected damage-per-turn with a flat credit for snare denial and an action cost for drinking draughts. Constants were calibrated against deterministic autoplayer runs rather than theory - tightening the model further made too many worlds uncertifiable - and the threshold itself stays authored tuning.
      references: [combat-viability-threshold, clue-graph-validator]

  - decision: vulnerability-double-damage
    core:
      status: accepted
      confidence: confirmed
      title: Vulnerability windows double damage taken
      summary: A cadence villain in a vulnerability window (natural, bound, or on consecrated ground) takes double damage, making the telegraphed windows tactically decisive. The coup de grace on a dormant villain doubles at strike level instead so the two bonuses do not stack.
      references: [revenant-cadence-ai, church-consecration-rite, revenant-binding-charm]

  - decision: npc-conversation-pause
    core:
      status: accepted
      confidence: confirmed
      title: Villagers pause for an approaching hunter
      summary: NPC routines suspend while the hunter is within two tiles, so conversation is never a footrace against a moving villager while relationships stay observable from further away.
      references: [npc-routines, social-action-costs]

  - decision: covert-actions-bypass-hostility
    core:
      status: accepted
      confidence: confirmed
      title: Covert actions need no cooperation
      summary: Spying, examining, and tracking anchored on an NPC work even when that NPC is hostile - watching someone requires no consent. Conversational actions (gossip, persuasion, favours, exposure) still require a non-hostile or leveraged subject.
      references: [social-action-costs, visible-opportunity-affordances]

  - decision: innocent-fallout-model
    core:
      status: accepted
      confidence: confirmed
      title: Fallout removes the victim and taxes Social play
      summary: Attacking an innocent villager marks the settlement hostile - consequential Social actions cost one extra point and trading stops - and every opportunity anchored on the victim is lost. No global-clock cost, per the spec; certified route independence guarantees a run stays winnable.
      references: [innocent-villager-fallout]

  - decision: death-respawn-model
    core:
      status: accepted
      confidence: confirmed
      title: Death resets the fight, not the knowledge
      summary: On death before the final hunt the hunter respawns at the settlement with full health, keeping inventory and discoveries, and the clock advances one turn. An exposed villain returns to its lair fully healed but keeps its threat tier and any silver-stopped regeneration. Death during the final hunt is defeat.
      references: [final-hunt-rules, hunter-death]

  - decision: autoplayer-golden-replays
    core:
      status: accepted
      confidence: confirmed
      title: Autoplayer-minted golden replays
      summary: A deterministic route-following autoplayer proves generated runs are playable start to finish, and its winning command logs serve as the CI replay checks - each golden run is re-executed from its share code and must reproduce the exact state digest.
      references: [command-replay, ci-and-pages-release]

  - decision: minion-spawn-placement
    core:
      status: accepted
      confidence: confirmed
      title: Event minions lurk at the map's far reaches
      summary: Scheme-event minions spawn at walkable tiles maximising distance from both the map's central entry and its exits, so they read as guards over the villain's work rather than ambushes on the front door.
      references: [travel-clock, ordinary-enemy-roster]

  - decision: favour-single-point
    core:
      status: accepted
      confidence: confirmed
      title: The favour is one point, once
      summary: The mystical favour grants exactly one temporary over-cap Mystic point once per run, so at most one Mystic-pool opportunity can ever be taken in a run. The planner models this and the certified routes may lean on it at most once between them.
      references: [seek-mystical-favour, investigation-pools]

  # Milestone 2, stage 1: case composition and ambiguous evidence.

  - decision: evidence-supports-rules-out
    core:
      status: accepted
      confidence: confirmed
      title: Clues carry supports and rules-out sets
      summary: Every clue template declares which candidates on its axis it supports and which it rules out. A clue with a non-empty rules-out set is discriminating; one with only supports is a soft sign that narrows suspicion without settling it. This is what makes evidence ambiguous but decisive - the player accumulates soft signs cheaply and pays for the eliminations that actually close the case.
      references: [ambiguous-but-decisive-evidence, three-by-three-case-composition]

  - decision: naming-requires-a-discriminator
    core:
      status: accepted
      confidence: confirmed
      title: Naming the villain requires an elimination, not a pile of hints
      summary: The Uncover command is rejected unless the hunter holds at least one discriminating identity clue. Soft signs alone can never name a villain, so a run cannot be won by guessing off atmosphere. The rejection is a distinct outcome (EvidenceNotDecisive) so clients can explain what is missing rather than reporting a generic refusal.
      references: [ambiguous-but-decisive-evidence]

  - decision: load-bearing-origin-and-scheme
    core:
      status: accepted
      confidence: confirmed
      title: Origin and scheme each decide a real preparation
      summary: Origin selects the counter reagent a villain-killing recipe requires, and scheme exposes a timed threat that can be pre-empted at a specific site for a pool cost. Neither axis is flavour - reading the origin wrong means crafting the wrong counter, and ignoring the scheme means eating an event that could have been blunted. Generation therefore guarantees a sight-findable discriminator on both axes.
      references: [three-by-three-case-composition, ambiguous-but-decisive-evidence]

  - decision: two-sources-per-origin-reagent
    core:
      status: accepted
      confidence: confirmed
      title: Every origin reagent has at least two sources on different maps
      summary: Route certification forbids the early and fallback routes from sharing a node, so a reagent with a single source strands the second route with no way to finish its counter. Content validation now rejects any origin whose counter reagent has fewer than two gathering sources. Interchangeable duplicate sources are deliberately not deduplicated - they are what keeps the two certified routes independent.
      references: [hunter-selection-and-certification, three-by-three-case-composition]

  - decision: two-sources-per-counter-ingredient
    core:
      status: accepted
      confidence: confirmed
      title: Every counter ingredient needs two sources, not just the reagent
      summary: The origin-reagent rule caught only half the trap. A villain's counter recipe strands the second certified route if any of its ingredients has a single source - cold iron had exactly one, so witch cases could certify a fallback route and then fail to certify an early one. Validation now walks every villain's weakness recipe and requires two sources for each input, counting gathering sites, clues that grant the item, and the hunter's starting kit. Starting-kit items count double because both routes always have them, which is why the silver bullet never stranded despite shot having one gathering site.
      references: [two-sources-per-origin-reagent, hunter-selection-and-certification]

  - decision: wards-as-second-defence-layer
    core:
      status: accepted
      confidence: confirmed
      title: Wards absorb charges and reweave over time
      summary: A warded villain spends a ward charge to absorb an incoming hit entirely unless the blow is struck with that villain's weakness, and regrows a charge on a fixed reweave cadence. This gives NPC-host villains a defence that reads as occult rather than physical, and the viability heuristic models it as a cycle-average damage-per-turn comparison so certification stays honest about how much slower an unarmed-with-the-counter hunter is.
      references: [three-by-three-case-composition, occultist-hunter]

  - decision: planner-ignores-non-goal-evidence
    core:
      status: accepted
      confidence: confirmed
      title: The planner searches only over what the goal requires
      summary: Origin signs, scheme signs, location clues, and scheme pre-emption are excluded from the planner's operator set, and item slots belonging to other villains or origins are pruned from the tracked state. Twenty-seven compositions multiplied the branching factor past the search budget; restricting the search to the goal predicate - identity evidence, the counter recipe, and its ingredients - brought certification back under a second. Generation validates the excluded evidence separately, after certification.
      references: [three-by-three-case-composition, hunter-selection-and-certification]

  # Milestone 2, stage 2: the Occultist and per-hunter certification.

  - decision: catalogue-carries-the-selected-hunter
    core:
      status: accepted
      confidence: confirmed
      title: A catalogue instance is per-run and knows its hunter
      summary: Hunters are authored one file per hunter under content/hunters, loaded into a roster, and one of them is selected onto the catalogue as `hunter` before generation. Everything downstream - planner, viability model, views, autoplayer - keeps reading `catalogue.hunter` and needs no knowledge that a choice was ever made. The alternative, threading a hunter id through every call site, would have touched three dozen places to say the same thing the catalogue can say once.
      references: [hunter-selection-and-certification, occultist-hunter]

  - decision: hunter-is-an-input-to-generation
    core:
      status: accepted
      confidence: confirmed
      title: The hunter is chosen before the world is built, not after
      summary: Route certification is per hunter, so the same seed yields different worlds for different hunters and a seed alone no longer identifies a run. Share codes therefore carry the hunter id and REPLAY_VERSION moves to 2, which invalidates version 1 codes rather than silently replaying them against a world that was never certified for them.
      references: [hunter-selection-and-certification, command-replay, share-code-format]

  - decision: no-route-may-need-an-exclusive-ability
    core:
      status: accepted
      confidence: confirmed
      title: Signatures are never load-bearing on a certified route
      summary: The planner models pools, items, travel, and opportunities, and deliberately models no signature ability. A certified route can therefore never require Killing Blow or Read the Sign, which is what makes the spec's rule - that neither profile may lean on the other's exclusive ability - hold structurally rather than by review. Signatures stay tools that change how a fight or a case goes, not keys that unlock it.
      references: [hunter-selection-and-certification, occultist-hunter]

  - decision: mystic-is-a-real-pool-not-only-a-favour
    core:
      status: accepted
      confidence: confirmed
      title: Mystic became a pool a hunter can own
      summary: The planner tracked Mystic as `mystic_bonus`, a single over-cap point granted by the favour, because no hunter had Mystic of her own. The Occultist has two, so the planner now starts the pool at the selected hunter's cap and the favour adds to it. The field was renamed from bonus to pool, because leaving the old name would have described the Huntress's situation as though it were the rule.
      references: [occultist-hunter, favour-single-point, investigation-pools]

  - decision: read-the-sign-reinterprets-held-evidence
    core:
      status: accepted
      confidence: confirmed
      title: The Occultist's edge is reinterpretation, not extra clues
      summary: Read the Sign upgrades one ambiguous identity sign the hunter already holds into a discriminating proof, rather than revealing a new clue. This makes her strength legible against the stage 1 evidence model - she gets more out of the same soft signs the Huntress would have to supplement with legwork - without adding evidence the planner would then have to reason about.
      references: [occultist-hunter, evidence-supports-rules-out, naming-requires-a-discriminator]

  - decision: warded-ground-is-data-driven-unnaturalness
    core:
      status: accepted
      confidence: confirmed
      title: Warded ground bites the unnatural, and content decides what that means
      summary: Ward the Ground marks an area that damages unnatural things crossing it, holding a lane for a hunter with nine health and no finisher. Which enemies count as unnatural is an authored flag on the enemy rather than a hardcoded list, so the restless dead and thralls are bitten while wolves and hired knives walk across untroubled, and a future enemy declares its own answer.
      references: [occultist-hunter, ordinary-enemy-roster]

  - decision: viability-reads-the-hunters-actual-kit
    core:
      status: accepted
      confidence: confirmed
      title: The viability model asks what this hunter can do, not what a hunter can do
      summary: The heuristic treated "has a Physical point" as "has a snare and a Killing Blow", which was the Huntress's kit written down as though it were everyone's. It credited the Occultist with a finisher she does not have, and ignored the warded ground she does. It now looks up the selected hunter's signatures and credits snare denial, the Killing Blow burst, and ward damage and denial only to a hunter who actually has them. Adding a hunter with new signatures now requires teaching this model what they are worth, which is the right place for that decision to be forced.
      references: [combat-viability-threshold, occultist-hunter, hunter-selection-and-certification]

  - decision: the-coup-is-a-choice-not-a-property
    core:
      status: accepted
      confidence: confirmed
      title: Opening the grave is a choice the planner weighs, not a fact it charges for
      summary: A dormant villain made the planner deduct a Physical point in every state, because prising the grave open costs one - but whether to do that is a decision, and the grave is not a required node. For the Huntress the deduction was harmless. For the Occultist, whose single Physical point is the ward she fights with, it silently zeroed her only combat ability in every candidate state, so no revenant case could ever certify and the search burned its whole budget proving it. Certification now scores both options - take the coup and lose the point, or keep the point and fight it awake - and certifies on whichever the hunter would actually choose. The coup's triple damage for striking something asleep is also open to anyone, since that is what the simulation does; only the Killing Blow double needs the signature.
      references: [viability-reads-the-hunters-actual-kit, combat-viability-threshold, occultist-hunter]

  - decision: seed-rejection-for-uncertifiable-worlds
    core:
      status: accepted
      confidence: confirmed
      title: A hunter is moved to the next seed rather than handed an uncertified case
      summary: Certification refuses roughly one seed in eight for the Occultist, where the Huntress is refused none. A refusal is correct - it means that world cannot be solved two independent ways by that hunter - so a run starts at the first seed at or after the requested one that certifies, and records the seed it actually used. This is the same rejection the generator already performs when it retries candidate worlds, applied one level up, and it keeps the guarantee that every world a player receives is certified.
      references: [hunter-selection-and-certification, clue-graph-validator, certified-route-deadlines]

  - decision: occultist-refusals-are-true-negatives
    core:
      status: accepted
      confidence: confirmed
      title: The Occultist's refused seeds have no second route to find
      summary: This was recorded as planner performance - the search doing exponential work to prove a negative - and that was wrong. Raising the node budget to fifty million lets the search run to completion in about twelve seconds and report that it exhausted the space without a qualifying route, rather than that it ran out of budget. The refusals are therefore true negatives - in those worlds no second independent route exists for her - and no amount of goal-directed ordering or admissible pruning can conjure one, because such techniques make a search reach its answer sooner and do not change what the answer is. Raising the budget only converts an honest "I gave up" into an honest "there is none". More fallback alternatives were tried as well, sixteen instead of four, and changed nothing.
      references: [seed-rejection-for-uncertifiable-worlds, dominance-pruning-did-not-help, clue-graph-validator, occultist-hunter]

  - decision: two-independent-routes-is-the-binding-constraint
    core:
      status: provisional
      confidence: confirmed
      title: What actually binds is disjoint supply, not search
      summary: Certification demands two routes sharing no nodes, so a case needs roughly twice the usable supply of everything a route consumes - identity clues, the counter's ingredients, the reagent. A hunter whose viability requires a richer loadout consumes more per route, and the Occultist crosses the point where the graph cannot furnish two disjoint sets about one seed in eight. The remaining levers are content, not code - place more identity clues or ingredient sources per case, or relax independence from whole-route disjointness to something weaker - and both change what every run looks like, so neither should be taken without deciding what independence is actually protecting against.
      references: [occultist-refusals-are-true-negatives, route-certification-strategy, seed-rejection-for-uncertifiable-worlds]

  - decision: dominance-pruning-did-not-help
    core:
      status: rejected
      confidence: confirmed
      title: Pool dominance pruning was sound, and changed nothing
      summary: Investigation points are only ever spent, never required to be absent, so a state holding more of every pool dominates one holding fewer - if the richer state cannot reach the goal, the poorer one cannot either. Dropping pools from the memo key and instead recording the maximal failed pool vectors per position is therefore sound, and collapses what looked like the offending dimension. It was implemented, together with an admissible bound on remaining travel legs, and then measured - the Occultist's refusal rate was identical at fourteen seeds in a hundred and twenty, with and without. Both were reverted rather than kept on the theory that they ought to help. The lesson for the next attempt is that duplicated pool states are not the bottleneck, so the cost is in the breadth of genuinely distinct states - which points at goal-directed ordering or a real admissible heuristic, not at better deduplication.
      references: [occultist-refusals-are-true-negatives, clue-graph-validator]

  # Milestone 2, stage 3: paired regional templates.

  - decision: content-anchors-name-roles-not-templates
    core:
      status: accepted
      confidence: confirmed
      title: A clue is anchored to a kind of place, not to one map
      summary: Gathers, clues, and scheme pre-emptions say `map = "settlement"`, which used to name the single settlement template and now names the role. Generation draws one template per role from the seed stream and resolves anchors through the role, so every template filling a role must offer the same slot vocabulary - the church, the forge, the graveyard - while arranging them differently. A world records the template it actually drew, which is what makes the choice inspectable and testable rather than invisible.
      references: [paired-regional-template-selection, paired-regional-scenario-library, seeded-mystery-generator]

  - decision: exits-are-paired-by-role
    core:
      status: accepted
      confidence: confirmed
      title: The travel triangle is a triangle of roles
      summary: Exit pairing used to be checked template against template, which silently required exactly one template per role. It now requires every template to carry an exit to each of the other two roles, so the triangle holds whichever templates a run draws. A template with a missing or self-referential exit fails content validation rather than producing a world a player can get stranded in.
      references: [content-anchors-name-roles-not-templates, three-map-world]

  - decision: every-template-must-be-reachable-by-some-seed
    core:
      status: accepted
      confidence: confirmed
      title: Authored maps that no seed can draw are treated as a bug
      summary: A generator test sweeps seeds and asserts every authored template is chosen by at least one of them. This caught a real defect immediately - the materialiser was recording the role label where the template id belonged, so both new templates were being built and then reported as the originals, and no test that only checked determinism or certification would have noticed. Dead content that no player will ever see is a bug, not a spare.
      references: [paired-regional-template-selection, milestone-two-variety-validation]

  - decision: in-media-res-opening
    core:
      status: accepted
      confidence: confirmed
      title: One node may be shared if the run opens already holding it
      summary: Certification may let both routes lean on a single node, on the condition that the run begins with that node already resolved - the hunter was told on the road in, or stopped on the way past. The rule independence actually protects is not "no shared node" but "no shared losable node" - it exists so that losing an informant to fallout cannot strand a run, and knowledge banked before play began cannot be lost. This is the same exemption structural ops already had, arrived at from the other side - a forced door stays forced, and a thing already learned stays learned. It removed the Occultist's refusals entirely, from fourteen seeds in a hundred and twenty to none.
      references: [occultist-refusals-are-true-negatives, two-independent-routes-is-the-binding-constraint, route-certification-strategy, seed-rejection-for-uncertifiable-worlds]

  - decision: what-may-never-be-banked
    core:
      status: accepted
      confidence: confirmed
      title: What a run may never open already knowing
      summary: A discriminating identity clue is never banked. It is the clue that rules alternatives out, so starting with it would leave a single ambiguous sign between the player and the villain's name, and half the mystery would be over before the first turn. Candidates are items, leads, and soft identity signs only, ordered least-revealing first. Also excluded - the mystical favour, because which route leaned on it is read back off the resolved bitmask and banking it would flag both; gated nodes, because a thing cannot honestly have been resolved while its door is still barred; and structural ops, which were already exempt and so gain nothing. Generation refuses a world that violates any of these rather than trusting the planner to have been careful.
      references: [in-media-res-opening, ambiguous-but-decisive-evidence, naming-requires-a-discriminator]

  - decision: banking-forgives-the-pool-cost-too
    core:
      status: accepted
      confidence: confirmed
      title: A banked node is a small gift of economy as well as position
      summary: A banked node costs the run nothing - no pool point, no effort, no obscurity, no turn - because it was not an action taken this run. That forgives its investigation cost as well as its position, which is a second and quieter gift than the one being asked for. Charging it was rejected - deducting from turn-zero pools contradicts the fiction of having already done the thing, and can underflow - so instead the candidate ordering breaks ties on cost, which keeps the gift small. Recorded as a known concession rather than left as a leak.
      references: [in-media-res-opening, investigation-pools]

  - decision: one-bane-one-boon-two-neutral
    core:
      status: accepted
      confidence: confirmed
      title: Every run draws one condition per axis, shaped one bad, one good, two neutral
      summary: Openings gained a second dimension - what the valley is like as the hunter arrives - across four axes of season, reception, hour and provenance. Every run draws one condition from every axis, and the set is shaped rather than uniform - exactly one bites, exactly one helps, and the other two are texture, with the bane and the boon never off the same axis. Which axis supplies which is drawn per run, so an unwelcoming valley in one game is an open-handed one in the next. Winter is cosmetic; the deep of winter is not. Each axis therefore holds three neutral entries, exactly one bane and exactly one boon, and validation enforces that shape, because any axis may be asked to supply any of the three roles.
      references: [in-media-res-opening, authored-content-catalogue]

  - decision: conditions-may-not-touch-the-final-fight
    core:
      status: accepted
      confidence: confirmed
      title: A bane may make the journey worse, never the hunt unwinnable
      summary: Route certification promises the hunt is winnable, so a bane is not allowed to quietly take that back. Boons are unconstrained in that respect - they can only ever make a certified route easier to walk, so they need no certification pass at all. Banes split by whether the planner must see them. An unwelcoming valley taxes consequential Social work, which changes what a route can afford, so it is drawn before certification and the planner certifies with the surcharge applied - and if the world cannot be certified under it, the run falls back to a cosmetic draw on the same seed rather than being refused. Ambush chance, sight, and extra ordinary enemies are applied freely, because journey pressure is already unmodelled variance by precedent - the seed has always rolled its own ambush chance between twenty and sixty percent. Nothing in the effect vocabulary touches final-fight viability, and nothing should be added that does.
      references: [one-bane-one-boon-two-neutral, combat-viability-threshold, clue-graph-validator]

  - decision: text-is-data-and-never-branched-on
    core:
      status: accepted
      confidence: confirmed
      title: Every player-facing string lives in one CSV, and nothing reads it back
      summary: All player-facing text - authored content prose, UI chrome, sim log lines, generator prompts - lives in content/strings.csv as an id, a context note for whoever writes or translates it, and the English. Content TOML and the clients hold ids; text is resolved at the point of display. The table is embedded at compile time like the rest of the content so native, WASM and CI still agree byte-for-byte, but it is deliberately outside SOURCES and so outside content_fingerprint - rewriting a line or translating it must not invalidate a share code in the wild. That exclusion is only sound while nothing reads the text back, which makes the rule - anything the RNG indexes, or that generation or the simulation branches on, stays in TOML. Slot ids, enum tags and cross-references stay for that reason. NPC name pools show the shape of the split - the pools stay in TOML because the RNG indexes them and pool order is a generation input, but they hold ids, so which villager is drawn is generation while what they are called is text and translates freely. Two violations existed when this landed and were fixed first - the church clue anchor sniffed a clue name for "candle", and minion placement searched feature names for "kill site" - both now authored fields. LogEvent.text is serde(skip) so log copy is outside the state digest for the same reason. All copy is currently agent-written placeholder and is wrapped in [square brackets] to say so; a test holds that gate until a human rewrites a row and removes them.
      references: [authored-content-catalogue, share-code-format, autoplayer-golden-replays]

  # Playtest 3: making the valley easier to walk and the case easier to hold
  # in the head. Six quality-of-life features drawn from what the genre has
  # already converged on, all landing in rh-client-core so both clients get
  # them at once.

  - decision: a-walk-is-ordinary-moves-not-a-new-command
    core:
      status: accepted
      confidence: confirmed
      title: Walking to a tile issues ordinary moves, one at a time
      summary: Clicking distant ground, or pressing Enter on the look cursor, now walks the whole path rather than taking a single step. It is implemented as a loop that computes the next BFS step and applies an ordinary Move command, so a walk is byte-identical in the replay to the same keys pressed by hand - no new command, no new share-code version, nothing the autoplayer or the golden replays can tell apart. What the feature removes is the pressing, not the turns; enemies still act after every step, and the clock is untouched because local movement never advanced it. The loop is capped at sixty-four steps, which no reachable tile on a thirty-two by twenty map needs, so a pathological path stops rather than spinning.
      references: [command-replay, mouse-inspection-and-actions]

  - decision: a-walk-stops-on-anything-worth-a-decision
    core:
      status: accepted
      confidence: confirmed
      title: What interrupts a walk is the whole design of the feature
      summary: A walk compares five facts either side of every step - health, position, whether the run ended, how many opportunities are discovered, and which hostile actor ids are visible - and stops on arrival, on refusal, on taking a wound, on a hostile coming into view that was not in view before, and on a lead being noticed. Stopping on newly visible hostiles rather than on any visible hostile is deliberate and follows Crawl - a walk that refuses to start while anything is on screen is useless in a settlement full of villagers and wolves, and the danger being warned about is the thing that just appeared. An interrupted walk keeps its destination, so the action panel offers to pick it up rather than making the player re-aim, which is the piece Cogmind found players actually missed.
      references: [a-walk-is-ordinary-moves-not-a-new-command, mouse-inspection-and-actions]

  - decision: the-dossier-answers-where-am-i
    core:
      status: accepted
      confidence: confirmed
      title: The record says what happened; the dossier says where the case stands
      summary: The Record is chronological, and an investigation asks "where am I" far more often than "what happened" - answering it meant re-reading the whole record. The dossier is a third screen on the same list machinery, built fresh from state every frame in three sections - the quarry, holding the day, the threat tier, the count of identity proofs, whether one of them discriminates, and whether the origin, scheme and lair are pinned; the leads outstanding, each with where it is and what pool it wants, marked when the hunter cannot currently pay; and the preparations, naming the reagent the counter must be quenched with once the origin is known, what in the pack would actually bite, and whether the church ground is warded. It states only what the run state already records, so it can reveal nothing the player has not earned.
      references: [investigation-pools, mouse-inspection-and-actions, text-is-data-and-never-branched-on]

  - decision: what-is-in-sight-is-one-list
    core:
      status: accepted
      confidence: confirmed
      title: The threat panel and the cursor walk the same list
      summary: Everything visible on the current map - hostiles with their health, villagers with their role - is sorted nearest first with hostiles ahead of people, and that one ordering serves both the In Sight panel and the Tab key that steps the look cursor through it. They cannot disagree, because there is nothing to keep in step - Tab finds the cursor's current position in the list and takes the next entry, wrapping. Tab also clears any stale mouse hover, because look_point prefers the hover and the cursor would otherwise be moved invisibly. Brogue's sidebar is the most-copied element in the genre for a reason, and the keyboard half of it is what makes it more than decoration.
      references: [mouse-inspection-and-actions, a-walk-stops-on-anything-worth-a-decision]

  - decision: travel-is-the-one-thing-worth-confirming
    core:
      status: accepted
      confidence: confirmed
      title: A cost the exit tile does not show gets asked for
      summary: Travel spends one of six days and can wake the scheme's next move, and none of that is legible from the exit tile the hunter is standing on - it was the only action in the game whose real price was invisible at the moment of taking it. Applying Command::Travel now opens a two-row confirmation instead, naming the destination, the day it will be, and saying so when that day is the one the minor or major event falls on or the one that begins the final hunt. The gate lives in apply rather than in the interact menu, so the menu's single-unblocked-action fast path cannot slip past it. It is rendered as an ordinary two-item overlay, so every renderer and every input path already knows how to work it. Nothing else is gated, because confirmations that fire on actions whose cost is visible are the ones players learn to dismiss without reading.
      references: [travel-clock, mouse-inspection-and-actions]

  - decision: hints-fire-once-and-the-report-marks-the-routes
    core:
      status: accepted
      confidence: confirmed
      title: Teaching happens at the moment it bites, and again at the end
      summary: Six first-time lines fire at most once each and at most one per action, most urgent first - the final hunt beginning, dropping to half health, the quarry gaining a tier, the first day spent, stamina running out, and the first lead standing open. They are checked against state after every applied command rather than raised by the simulation, so the simulation knows nothing about them and they cannot reach the log, the state digest, or the share code. The consequence, accepted rather than fixed, is that restoring a share code shows them again - the seen set is session memory, and putting it in the code would invalidate every code in the wild for something that is not part of the run. The case report gains the other half - the threat tier reached, what was carried into the ending against what would actually have bitten, and every step of both certified routes marked done or not done against the resolved set. No other roguelike can show the intended solution, because no other one certifies routes before materialising the world - this is the payoff for having done that.
      references: [route-certification-strategy, seeded-mystery-generator, text-is-data-and-never-branched-on]

  # Milestone 2, stages 4 and 5: variation packs, machines, event decks.

  - decision: packs-rewrite-the-template-before-anchoring
    core:
      status: accepted
      confidence: confirmed
      title: Variation packs apply during materialisation, not after certification
      summary: The spec ordered pack choice after route certification so packs could never decide whether a world certifies. That guarantee holds here by a stronger argument - the planner is geometry-blind, reasoning about maps, pools and gates and never about tiles, so slot moves, terrain patches and enemy pressure are invisible to it whichever side of certification they land. Applying packs while the map is built, before anything anchors to it, means features, opportunities and spawns all land on the varied map rather than being retargeted afterwards, which removed a whole class of retargeting bugs. What a pack genuinely can do is wall something off by accident, and that is guarded twice - per-pack flood-fill in content validation, and a whole-world reachability check in final validation that treats forceable terrain as a price rather than a wall.
      references: [regional-variation-packs, paired-regional-template-selection, clue-graph-validator]

  - decision: machines-are-never-load-bearing
    core:
      status: accepted
      confidence: confirmed
      title: Machines open ground, never close it, and the planner cannot see them
      summary: A machine is an ordinary opportunity worked through the ordinary Interact command - a lever's worth of input, one observable payoff, spent once. The spec's rule that a random optional machine may never be the sole support for a certified route is enforced structurally, the same way scheme signs are - the planner does not know machines exist, so no route can lean on one, and a sweep asserts no certified route step ever touches one. Validation additionally forbids a machine patching toward blocking terrain, because a machine fires at runtime, after every generation-time reachability check has already passed - machines may only ever open the map further.
      references: [mission-machine-library, semantic-command-boundary, visible-opportunity-affordances]

  - decision: event-decks-are-additive-only
    core:
      status: accepted
      confidence: confirmed
      title: Each map deals a small seeded deck, and events only ever add
      summary: Every generated map receives a two-card deck drawn from its role's pool, narrowed by the case's scheme, during generation from the seed stream. One event fires per arrival until the deck runs dry, never at run start - turn zero belongs to the opening. The effect vocabulary is closed and additive - fiction, an enemy arriving, something changing hands, an undiscovered opportunity announcing itself - so an event can add pressure, supply or information but has no way to remove access to a certified route. Firing happens inside the sim on the travel command, so replays reproduce it from the command log and the run PRNG.
      references: [mission-event-decks, travel-clock, command-replay, event-log]

  # Architecture deepening: concentrating rules that had been written N times.

  - decision: terrain-semantics-live-beside-the-enum
    core:
      status: accepted
      confidence: confirmed
      title: Terrain movement semantics are written once, beside the enum
      summary: What terrain can be walked, forced, or seen through was written four times - once in rh-core's fov for the sim, once in rh-content's validation, and twice more as spelled-out variant lists inside the two reachability flood fills. A new terrain variant had to be added everywhere in lockstep or the sim and the validators would quietly disagree about where a hunter can stand. The classifiers now live in rh-content beside the Terrain enum itself; fov re-exports them so every existing rh-core path still resolves, and both flood fills compose is_walkable and is_forceable instead of re-listing variants. The validator's fill keeps its one deliberate extra - features count as passable so a slot sitting on an altar or workstation registers as reachable, being used from beside in play.
      references: [authored-content-catalogue, map-visibility, three-map-world]

  - decision: a-pool-costed-opportunity-costs-at-least-a-point
    core:
      status: accepted
      confidence: confirmed
      title: No opportunity may name a pool and cost nothing
      summary: Content validation refuses a gather that names a pool with a cost of zero and a scheme pre-emption that costs nothing; clue templates and generated NPC actions have their cost fixed at one by materialisation. This closes a real divergence at the settlement-hostility surcharge - the planner only surcharges Social actions already costing a point, while the sim surcharges unconditionally, so a free Social opportunity would have certified as free and then charged a point in play. Rather than pick which guard was right, the case is made unrepresentable - consequential work spends a point, per the original Social contract, and a free interaction does not name a pool at all.
      references: [social-action-costs, innocent-fallout-model, conditions-may-not-touch-the-final-fight]

  - decision: corroboration-threshold-is-authored-tuning
    core:
      status: accepted
      confidence: confirmed
      title: The corroboration threshold is one authored number, read everywhere
      summary: How many identity proofs naming the quarry demands was the literal two written independently at nine sites across six crates - the sim's gate and its log twin, the autoplayer's readiness, the interact menu, the dossier, the planner's goal, and generation's final validation. It is now corroborating_proofs in balance.toml, per the standing rule that anything the rules branch on is authored tuning, and rh-core exposes one Corroboration reading - have, need, decisive - that every layer asks instead of counting for itself. Supply-side checks that look like the same two are not it and keep their own literals - two discriminating clues per axis and two placed discriminators are route-independence arithmetic, two disjoint routes each needing one, and say so in their messages.
      references: [naming-requires-a-discriminator, evidence-supports-rules-out, authored-content-catalogue, two-sources-per-origin-reagent]

  - decision: sim-is-truth-for-the-economy
    core:
      status: accepted
      confidence: confirmed
      title: Where planner and sim disagreed on a price, the sim was right
      summary: The planner's travel restored Lore, Social and Physical but not Mystic, while the sim restores every pool per the spec - travel restores one point to every pool up to its cap. The consolidation adopts the sim's behaviour as truth, so the planner stops under-crediting a Mystic hunter's economy and certification may reach routes it used to refuse. Which seeds certify can therefore differ, and REPLAY_VERSION moves to 3 rather than letting a version 2 code replay against a world it was never certified for. The planner applies restores by adding below cap only, because it tracks the favour's over-cap Mystic point in the same field and a clamping restore would have silently destroyed it.
      references: [investigation-pools, mystic-is-a-real-pool-not-only-a-favour, favour-single-point, share-code-format]

  - decision: viability-agreement-is-a-corpus-scan
    core:
      status: accepted
      confidence: confirmed
      title: The estimate is held to the driven game by a corpus scan
      summary: The viability heuristic is empirical - calibrated against autoplayer runs, per viability-model-calibration - so its agreement test is empirical too. A slow-tier scan autoplays a per-hunter seed corpus and asserts the win rate does not fall more than a fixed band below the mean certified viability. One-sided by design - the autoplayer out-performing the estimate is fine, and the failure being caught is the estimate over-promising, which is the direction that would certify worlds a hunter cannot actually win. The band is wide, five hundred and fifty permille, because the two numbers measure different journeys - the estimate prices the final fight under the route's loadout while the scan drives the whole run, and ambushes, events and the bot's own imperfect play are deliberately unmodelled variance. The first run made the historical calibration a number - the huntress won 645 against a certified 946, a gap of three hundred - and surfaced a debt nothing had measured before - the occultist won 354 against a certified 884, five hundred and thirty adrift, so either her bot tactics or her estimate need work. The band pins today's measured reality rather than an aspiration, and tightens as the debt is paid. A deterministic no-variance fixture comparison was considered and declined - it would mean teaching the sim a second way to roll, and the corpus is the calibration instrument this model was already built with.
      references: [viability-model-calibration, autoplayer-golden-replays, combat-viability-threshold]

  - decision: search-moves-and-route-steps-stay-two-types
    core:
      status: accepted
      confidence: confirmed
      title: A search move is index-space; a route step is world-space
      summary: An architecture pass proposed collapsing the planner's internal Action enum into the serialized RouteAction so the planner emits exactly what the autoplayer consumes. Declined on inspection - the two are different representations doing different work. Action::Resolve carries the op index the search's bitmask bookkeeping runs on; RouteAction::Resolve carries the OpportunityId the world and the autoplayer speak. Collapsing them means either id-to-index lookups inside the search's hot loop or a route type that leaks search internals to everything that reads a route. They meet at exactly one translation site, in apply_action, which is a boundary earning its keep rather than duplication. The defects that motivated the proposal were real but lay elsewhere - the autoplayer branching on route prose, and action costs written twice - and are fixed on their own.
      references: [route-certification-strategy, text-is-data-and-never-branched-on, clue-graph-validator]

  # Playtest feedback: what a first-time player could not find out.

  - decision: two-control-schemes-with-no-capitals-by-default
    core:
      status: accepted
      confidence: confirmed
      title: The default scheme steers with the numpad and asks for no capitals
      summary: Playtesting found the roguelike hands hostile to anyone who has not played one - hjkl steering forces the three commands whose letters it takes onto capitals, so the game demanded shift for a silver bullet, a Killing Blow and the record. There are now two schemes, cycled from a splash row that changes in place rather than opening a screen. Numpad is the default - arrows and the keypad steer, which frees b, k and l, and the whole game is playable without reaching for shift. Roguelike keeps hjkl and yubn and takes the capitals back. The scheme lives on the session, so both clients read it from one place; the bindings table on the splash is filled from the same binding table the key translator reads, via key_label, so a scheme change cannot leave the splash advertising keys that no longer work.
      references: [semantic-command-boundary, client-input-bindings]

  - decision: the-guide-is-content-not-a-tutorial
    core:
      status: accepted
      confidence: confirmed
      title: How to solve a hunt is eight authored entries, not a scripted tutorial
      summary: A player who had read the grimoire still could not say how a hunt is won. The answer is a second reference screen, opened with i, holding eight entries - the shape of a hunt, naming the thing, origin, scheme, the counter, the clock, the fight, and what failure costs. It is guide.toml with the grimoire's own schema and it renders through the same list view, so method and lore are two decks of the same kind rather than two mechanisms. Deliberately not a scripted tutorial - a tutorial has to be sequenced against a run and would become a second, drifting copy of the rules, while a reference deck is content the rules already validate and any string in it is one row in the table.
      references: [authored-content-catalogue, text-is-data-and-never-branched-on, hunter-grimoire]

  - decision: an-item-says-what-it-is-for-wherever-it-is-listed
    core:
      status: accepted
      confidence: confirmed
      title: Pack lines carry their description, on hover and in the dossier
      summary: Item descriptions were authored but reached no player - the sidebar had room for names only. The pack view model now carries each item's description beside its label, so the web sidebar shows it as a tooltip, and the dossier gains a pack section that spells every carried item out for the terminal, where there is nothing to hover. Both read the same authored description, so a rewritten item blurb lands in both places at once.
      references: [authored-content-catalogue, case-dossier]

  - decision: a-walk-is-paced-by-the-client-not-the-session
    core:
      status: accepted
      confidence: confirmed
      title: Click-to-walk takes one step per client tick
      summary: Click-to-walk resolved its whole path inside the intent, which read as a teleport and hid whatever interrupted it. The session now takes the first step, so the click feels answered, and exposes step_walk for the client to tick - ninety milliseconds in both clients. Nothing about the simulation changed - each step is still an ordinary recorded Move, so replays are unaffected. The walk's two states had to be split to do it - walk_active says whether to tick again, while travel_target outlives an interruption so the walk can be offered again rather than re-aimed.
      references: [command-replay, semantic-command-boundary]

  - decision: an-opening-is-one-paragraph
    core:
      status: accepted
      confidence: confirmed
      title: Each opening says its piece in one paragraph
      summary: Openings were authored as two paragraphs each, and a run draws five of them - hook, condition and the rest - so the game opened with ten paragraphs before a player had pressed anything. Every opening is now a single paragraph carrying the same information, which is a content change only - the string ids collapsed from body.1 and body.2 to body, and strings.csv sits outside the content fingerprint, so no share code was invalidated by the rewrite.
      references: [in-media-res-opening, conditions-may-not-touch-the-final-fight, authored-content-catalogue]

  # Milestone 3: paying the certification debt.

  - decision: a-loss-is-attributed-by-the-driver-not-the-world
    core:
      status: accepted
      confidence: confirmed
      title: Where a run was lost is a fact about the driver, not the world
      summary: "The agreement scan could say only that the estimate over-promised, never where the promise broke, because three end states collapsed into two - a bot that stalled was indistinguishable from a hunter who fought and fell. The attribution now lives in an AutoplayReport the driver builds, not in Outcome. Outcome stays two variants because it is serialized into run state and a player can only ever observe those two; widening it would have moved every digest for a fact no player can see. The report's decisive field is rescored_permille - the same viability estimate the planner ran, against the loadout the bot actually assembled at the moment the fight began. If it matches the promise and she still lost, the estimate is wrong; if it falls far short, she never assembled what was certified. One number, and the two remedies share nothing."
      references: [viability-agreement-is-a-corpus-scan, autoplayer-golden-replays, command-replay, share-code-format]

  - decision: the-occultist-gap-is-preparation-not-tactics
    core:
      status: accepted
      confidence: confirmed
      title: She reaches the fight carrying nothing, and it was predicted wrongly
      summary: "The diagnosis was run before the remedy was chosen, and it falsified the stated prediction. The expectation was FoughtBadly - that the bot's combat ladder was Huntress-shaped and the Occultist was being asked for a finisher she does not own. The corpus says otherwise: thirty of her forty-eight losses are ArrivedUnderprepared and none at all are FoughtBadly, with a mean shortfall of 587 permille between what the route promised and what she was carrying when the fight started. The Huntress shows the same shape more mildly - eleven underprepared against four fought badly. Every underprepared run ends at the clock's forced hunt rather than one she chose, and the pattern in what she holds is exact: durable kit survives (a cold-iron pin is still in the pack) while every consumable is at zero. She crafts the counter the route certified and spends it before the fight the route certified it for. The remedy is therefore route execution, not repricing the ward and not the combat ladder. Recorded because the prediction was wrong in a useful direction: had the remedy been chosen from the prediction, the work would have gone into the one place the evidence exonerates."
      references: [a-loss-is-attributed-by-the-driver-not-the-world, viability-agreement-is-a-corpus-scan, viability-model-calibration]

  - decision: the-bot-asks-for-abilities-its-hunter-does-not-have
    core:
      status: accepted
      confidence: confirmed
      title: A stat check is not a capability check
      summary: "A smaller finding the same instrument turned up, and the mirror image of what was predicted. The combat ladder gates signatures on physical >= 1, which is a check on the pool rather than on the kit, so a hunter is asked for whatever the ladder lists regardless of whether she owns it. The counted refusals show the Huntress reaching for ward-the-ground sixty-six times across the corpus - it is the Occultist's signature and the Huntress has never had it - against thirteen for the Occultist reaching for killing-blow. The fall-through is harmless in play, costing a decision pass rather than an action, which is exactly why it survived: nothing was counting. It is not the cause of the certification gap and is not being fixed as though it were, but the ladder should ask what the hunter has rather than what she can afford, the way the viability model already does."
      references: [the-occultist-gap-is-preparation-not-tactics, hunter-selection-and-certification, hunter-combat-abilities]

  - decision: the-driver-follows-the-soonest-ready-route
    core:
      status: accepted
      confidence: confirmed
      title: The bot walks the route that reaches a hunt first, not the listed first
      summary: "The autoplayer followed certified_routes.first(), which the generator lists as the early route, even when the independent fallback was ready sooner, at a lower threat tier, and priced higher. For a frail hunter that was the wrong choice thrice over: a later hunt is a longer journey through a deadly valley, a villain that has ramped a tier, and more days spent that a death can no longer afford. The driver now picks the route with the least ready_by_turn, breaking ties toward the surer estimate. The two routes are certified independently walkable, so which one the driver takes is its choice to make and changes nothing about the world. This one change lifted the Occultist from 354 to 541 permille won; it was the single largest lever in closing the gap the diagnosis opened."
      references: [the-occultist-gap-is-preparation-not-tactics, route-certification-strategy, a-loss-is-attributed-by-the-driver-not-the-world]

  - decision: a-frail-hunter-kites-and-a-fallen-one-respawns-clear
    core:
      status: accepted
      confidence: confirmed
      title: Survival tactics that a nine-health hunter actually needs
      summary: "Two sim-and-driver changes for the hunter the model treats as able to stand in a brawl she cannot. The driver: a hunter without the health or a signature to trade blows no longer walks into a pack to melee it - she shoots while it closes and breaks contact when surrounded, keeping moving so the route gets done rather than trading herself down on the road. The sim: a fallen hunter respawns at the settlement tile farthest from any waking hostile rather than at the entry, where the map's own minions cluster - respawning there was a death that begat a death. The respawn is a change to the simulation, so any earlier share code with a pre-final death would replay from a new position; REPLAY_VERSION moves to 4 rather than let a version 3 code diverge silently. The combat ladder was also taught to ask what signatures the hunter owns rather than gate on a Physical point alone - harmless before, but it had the Huntress reaching for a ward she has never carried dozens of times a run."
      references: [the-occultist-gap-is-preparation-not-tactics, the-bot-asks-for-abilities-its-hunter-does-not-have, share-code-format, sim-is-truth-for-the-economy]

  - decision: the-agreement-band-falls-to-what-was-measured
    core:
      status: accepted
      confidence: confirmed
      title: The band falls from 550 to 450, and states where the debt still stands
      summary: "The corpus band only ever moves down, each cut backed by a scan. With the driver taught to follow the soonest route, to kite as a frail hunter, and to respawn clear of a pack, the Huntress closed to a roughly 230 permille gap and the Occultist to roughly 390, so the band falls from 550 to 450 - a real hundred-permille tightening rather than an aspiration. It does not reach the 250 the plan aimed at, and the reason is recorded rather than hidden: the Occultist's residual gap is a frail hunter's genuinely deadlier journey, which the estimate does not model and the band exists to absorb. Her losing runs reach the fight after two to four deaths at a ramped tier, some of them fights the estimate rightly calls winnable that she enters ground down. Closing that last stretch is a survival-tactics or a journey-modelling problem for a later pass, not a mispriced final fight."
      references: [the-driver-follows-the-soonest-ready-route, a-frail-hunter-kites-and-a-fallen-one-respawns-clear, viability-agreement-is-a-corpus-scan]

  # Milestone 3: a third hunter, to prove the model generalises.

  - decision: the-advocate-certifies-on-a-priced-second
    core:
      status: accepted
      confidence: confirmed
      title: A social hunter is made certifiable by pricing her one combat trick
      summary: "The third hunter works the case through people - the highest Social pool in the game, and a signature that presses a soured witness back into giving - but has neither the health to trade blows nor a snare to deny them. She could not certify at all as she stood, because the viability model recognised only three physical-point effects and none of them are hers: a hunter with no snare, no killing blow, and no ward wins on raw health and blade, which does not clear the threshold. So a fourth priced effect was added, stand-with-me: a villager who owes her steps up for a while, adding blows and taking a share of what comes back. It is priced in the model's own two currencies - damage a turn credited at half rate like the ward, and turns survived credited as half its duration - so no new axis enters the estimate. She is modelled as a buff on the hunter, not an actor on the board: an ally with its own tile and turn would touch targeting, occupancy, and the digest, where a second she has earned is two numbers that count down. Driven, she wins 937 permille against a certified 842, over-performing the estimate, which is the safe one-sided direction and the point: her certified worlds are the ones she can plainly win."
      references: [hunter-selection-and-certification, viability-model-calibration, the-occultist-gap-is-preparation-not-tactics, a-frail-hunter-kites-and-a-fallen-one-respawns-clear]

  - decision: the-default-hunter-is-chosen-not-sorted
    core:
      status: accepted
      confidence: confirmed
      title: The default hunter is the Huntress by name, not whoever sorts first
      summary: "A run with no hunter chosen falls back to a default, which was the first hunter by id. Adding the Advocate put her there by alphabetical accident - a worse first run, since she is the subtlest of the three to learn on, and a slower one, since a social hunter is the planner's most expensive to certify and an unlucky default seed could make a fresh run pause for twenty seconds while the search for a route she cannot walk exhausts itself. The default is now the Huntress by name, the plainest hunter and the fastest to certify, falling back to first-by-id only if she is somehow absent. Tests that do not care which hunter they run also went through the default, so this keeps the suite from paying the Advocate's certification cost to check things that have nothing to do with her."
      references: [the-advocate-certifies-on-a-priced-second, catalogue-carries-the-selected-hunter]

  - decision: the-advocates-slow-refusal-is-a-known-planner-cost
    core:
      status: accepted
      confidence: provisional
      title: A seed the Advocate cannot be given fairly takes the planner a while to refuse
      summary: "Certifying is per hunter, and the Advocate is the most expensive to certify: her high Social pool makes many nodes affordable, so the search tree branches wide, and a seed that genuinely has no route she can walk is only proven so by exhausting the whole budget - eight opening attempts, each an iterative-deepening search to two hundred thousand states, about twenty seconds in all. She certifies most seeds quickly and the game rejects an uncertifiable one forward to the next, so a player feels this only as an occasional pause on hunter selection, and the tests are bounded to check a fixed number of certified worlds rather than pay for a run of refusals. It is recorded as provisional because the honest fix is a real one - an admissible upper bound on a world's best possible viability, to refuse a hopeless seed before the search rather than after - and that is a planner-performance pass of its own, deliberately not rushed here where it could shift which seeds certify."
      references: [the-advocate-certifies-on-a-priced-second, route-certification-strategy, search-moves-and-route-steps-stay-two-types]

  # Milestone 3: nothing told by colour alone, and a web client you can drive.

  - decision: redundancy-is-fixed-in-the-view-model-not-the-renderers
    core:
      status: accepted
      confidence: confirmed
      title: What a player must tell apart is carried by more than a hue, once
      summary: "A run screen distinguished several things by colour alone: a disabled action was greyed, a hostile was tinted, a log line's kind was one of eight colours, and a villain and a villager could even share a glyph. The fixes live in the shared view model, not in each renderer, because the view model exists precisely so the two clients cannot drift and a fix applied twice would. A disabled action now always carries a note - enforced in the one place actions are built, with an assert for authoring gaps and a fallback so a real player never faces a dead row with no reason. Each log line is tagged with its kind in text, composed in the view model so both clients get it. The sight list marks hostility with a symbol. And the map gained a written key - a fixed vocabulary, a legend and not a second map - so the canvas is never the only place a glyph's meaning lives. Two real glyph collisions were fixed in content and a validation test forbids their return: a villain's glyph is its own, and no villager, enemy, or feature may take it."
      references: [accessible-presentation, text-is-data-and-never-branched-on, the-guide-is-content-not-a-tutorial]

  - decision: the-web-client-is-driveable-without-sight
    core:
      status: accepted
      confidence: confirmed
      title: Real controls, focus, and a contrast a machine checks
      summary: "The browser client rendered its panels as anonymous divs and clickable list items: nothing announced itself to assistive technology, nothing held a keyboard focus ring, and the only tabindex removed the one the canvas had. Action rows are real buttons now, disabled ones marked aria-disabled so they stay reachable and can say why; menus are a listbox of options with aria-selected, so a screen reader knows which row confirming will take; the modal is a dialog; the status line is a live region that announces when it changes; the map is an image with a label pointing at the panels that describe it; and the focus ring is back, given to every control. A textual mirror of the canvas map was deliberately left out of scope. Contrast is a gate rather than an eye: a test computes the WCAG ratio of every map colour against the canvas and fails below the bar for large text - it caught remembered ground sitting at 2.2 to 1, genuinely too dim to read, and that colour was lifted until it passed."
      references: [redundancy-is-fixed-in-the-view-model-not-the-renderers, web-client, mouse-inspection-and-actions]
