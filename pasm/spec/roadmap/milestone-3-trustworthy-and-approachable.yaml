entities:
  - milestone: milestone-3-trustworthy-and-approachable
    core:
      status: proposed
      confidence: provisional
      title: Milestone 3 - Trustworthy certification, and a way in
      summary: Pay the debt that undermines the game's central promise, then open the door to players who are not already roguelike readers. A certified world must be a world the selected hunter can actually win, which it currently is not for the Occultist. A third hunter proves the per-hunter certification model generalises past the two it was built against. Accessibility and onboarding make the game playable by someone who has not read its source.
      goals:
        - Close the gap between certified viability and driven win rate, and tighten the agreement band to prove it closed.
        - Add a third hunter whose posture differs from both existing hunters, certified per-hunter like the others.
        - Make the game playable without relying on colour alone, and legible to assistive technology.
        - Get a first-time player from the splash to a first correct naming without outside help.
      rationale:
        - Route certification is the guarantee the whole generator rests on; while the estimate over-promises, that guarantee is not being kept.
        - Two hunters cannot distinguish a general model from one fitted to a pair.
        - Everything shipped so far assumes a reader who already knows what a roguelike asks of them.
      references: [viability-agreement-is-a-corpus-scan, hunter-selection-and-certification, the-guide-is-content-not-a-tutorial, two-control-schemes-with-no-capitals-by-default]

  - component: viability-gap-diagnosis
    core:
      status: proposed
      confidence: provisional
      title: Find out which half of the estimate is wrong
      summary: "The corpus scan records the Huntress winning 645 permille against a certified 946, and the Occultist winning 354 against a certified 884 - five hundred and thirty adrift. Two quite different faults produce that number and the remedies share nothing, so the gap is diagnosed before it is closed. Either the estimate misprices what the Occultist brings to the final fight, or the autoplayer does not know how to play her - she fights through Mystic, wards and charms rather than snares and Killing Blows, and the bot's tactics were written against a hunter who does not. Instrument the losing runs on the Occultist corpus and report where each was lost: arrived underprepared, arrived prepared and fought badly, or died before arriving."
      goals:
        - Attribute every Occultist loss in the corpus to a stage of the run.
        - Decide, on evidence, whether the fix belongs in the viability model or in the autoplayer's tactics.
      rationale:
        - The band is set wide at five hundred and fifty permille to pin measured reality rather than an aspiration; it is a debt marker, and this is the work that reads it.
        - A known reproducer already exists - the autoplayer loses seed 17 as the Occultist - so the diagnosis has somewhere concrete to start.
      references: [milestone-3-trustworthy-and-approachable, viability-agreement-is-a-corpus-scan, viability-model-calibration, autoplayer-golden-replays]
    architecture:
      owner: clue-graph-validator
      reads: [seeded-mystery-generator]
    implementation:
      status: confirmed
      target_paths: [crates/rh-core/src/viability.rs, crates/rh-replay/src/autoplay.rs, crates/rh-replay/src/corpus.rs, crates/rh-core/src/state.rs, crates/rh-cli/src/main.rs]
      tests: [crates/rh-replay/tests/golden.rs]

  - component: certification-keeps-its-promise
    core:
      status: proposed
      confidence: provisional
      title: A certified world is one the chosen hunter can win
      summary: "Close the diagnosed gap, wherever it was found, and tighten the agreement band as the visible proof it closed. The band is the instrument as well as the gate - a number that only ever moves down, each reduction backed by a corpus scan. The settlement respawn defect is fixed here too, being a plausible contributor: enemies respawning near the settlement respawn point can cost a hunter a run in a way no route model prices."
      goals:
        - Bring both hunters' driven win rates within a band that no longer reads as an outstanding debt.
        - Fix enemy respawn placement near the settlement respawn point.
        - Leave the agreement test one-sided, so an over-performing autoplayer still passes.
      rationale:
        - Tightening the band without closing the gap only hides the debt; closing it without tightening leaves nothing to stop it reopening.
      references: [milestone-3-trustworthy-and-approachable, viability-gap-diagnosis, viability-agreement-is-a-corpus-scan, encounter-turn-rules]
    architecture:
      owner: clue-graph-validator
      reads: [authored-content-catalogue]
      validates: [seeded-mystery-generator]
    implementation:
      status: confirmed
      target_paths: [crates/rh-core/src/viability.rs, crates/rh-core/src/sim.rs, crates/rh-replay/src/autoplay.rs, content/balance.toml]
      tests: [crates/rh-replay/tests/golden.rs, crates/rh-gen/tests/generator.rs]

  - component: third-hunter
    core:
      status: proposed
      confidence: provisional
      title: A third hunter, to prove the model generalises
      summary: Add a hunter whose investigation and combat posture differs from both the Huntress and the Occultist, certified per-hunter exactly as they are. The value is as much structural as it is content - per-hunter certification, the viability model, the autoplayer's tactics and the hunter-selection screen were all built against a pair, and a third is what distinguishes a general model from one fitted to two cases.
      goals:
        - Give the third hunter a route through the clue graph the existing two cannot walk.
        - Certify every case composition for the third hunter at the same threshold as the others.
        - Surface whatever the pair-fitted assumptions turn out to be, rather than working around them.
      rationale:
        - The Occultist's addition already exposed a planner that deducted a Physical point unconditionally; a third hunter is the cheapest way to find the next assumption of that kind.
      references: [milestone-3-trustworthy-and-approachable, hunter-selection-and-certification, certification-keeps-its-promise, catalogue-carries-the-selected-hunter]
    architecture:
      owner: authored-content-catalogue
      reads: [seeded-mystery-generator]
      validates: [clue-graph-validator]
    implementation:
      status: confirmed
      target_paths: [content/hunters, crates/rh-content/src/embedded.rs, crates/rh-core/src/viability.rs, crates/rh-replay/src/autoplay.rs]
      tests: [crates/rh-gen/tests/generator.rs, crates/rh-replay/tests/golden.rs]

  - component: accessible-presentation
    core:
      status: proposed
      confidence: provisional
      title: Nothing is signalled by colour alone
      summary: The map, the panels and the case report currently lean on colour to carry meaning, and neither client offers anything to assistive technology. Every distinction a player must make becomes available without colour - glyph, label or position - and the web client's panels become navigable and announceable rather than a rendered blob of markup. Contrast is checked rather than assumed.
      goals:
        - Make every colour-carried distinction also carried by something else.
        - Give the web client a keyboard-reachable, announceable structure for its panels and lists.
        - Check contrast against a stated standard rather than by eye.
      rationale:
        - An ASCII game has an unusually short path to being accessible, and an unusually poor excuse for not being.
      references: [milestone-3-trustworthy-and-approachable, terminal-client, web-client, mouse-inspection-and-actions]
    architecture:
      owner: web-client
      reads: [authored-content-catalogue]
    implementation:
      status: declared
      target_paths: [crates/rh-web/src/lib.rs, crates/rh-terminal/src/render.rs, web/main.js, web/style.css]
      tests: [crates/rh-client-core/tests/session.rs]

  - component: first-run-onboarding
    core:
      status: proposed
      confidence: provisional
      title: A first-time player reaches a first naming unaided
      summary: The guide says how a hunt is solved and the splash lists the keys, but nobody has established that the two are enough. This is a validation task before it is a building task - watch a first run happen, find where it stalls, and answer only what actually stalled it. Whatever is added stays content wherever it can be, per the standing preference for a reference deck over a scripted tutorial.
      goals:
        - Establish where a first-time player actually stalls, rather than guessing.
        - Close those specific gaps, preferring authored content to scripted sequence.
        - Avoid building a tutorial that becomes a second, drifting copy of the rules.
      rationale:
        - The guide was written from the inside, by someone who knows the answer; that is exactly the position from which its gaps are invisible.
      references: [milestone-3-trustworthy-and-approachable, the-guide-is-content-not-a-tutorial, opening-splash-screen, an-opening-is-one-paragraph]
    architecture:
      owner: authored-content-catalogue
      reads: [hunter-grimoire]
    implementation:
      status: declared
      target_paths: [content/guide.toml, content/strings.csv, crates/rh-client-core/src/view.rs]
      tests: [crates/rh-client-core/tests/session.rs]
